<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destiny Matrix · 08.05.2002</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #01030d;
      font-family: 'Inter', sans-serif;
      cursor: none;
    }

    canvas#scene {
      display: block;
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    /* ── Custom cursor ───────────────────────────────── */
    #cursor {
      position: fixed;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      will-change: transform;
      transition: width .18s, height .18s, background .18s, border .18s;
    }
    #cursor.on-star {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.36);
    }

    /* ── Node overlays ───────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    .node-tag {
      position: absolute;
      text-align: center;
      transform: translate(-50%, 0);
      pointer-events: all;
      cursor: none;
    }
    .node-tag .t-num {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 0 0 14px rgba(180,220,255,0.7);
      transition: opacity .5s;
    }
    .node-tag .t-label {
      font-size: 7.5px;
      font-weight: 400;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.42);
      margin-top: 6px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .4s;
    }
    .node-tag.lit .t-label { opacity: 1; }

    /* ── Minimal HUD ─────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    #hud-label {
      position: absolute;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
    }
    #hud-credit {
      position: absolute;
      bottom: 30px; left: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.14);
      white-space: nowrap;
    }
    #hud-date {
      position: absolute;
      bottom: 30px; right: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.14);
      pointer-events: all;
      cursor: none;
      transition: color .25s;
    }
    #hud-date:hover { color: rgba(255,255,255,0.38); }

    /* DOB inline edit input */
    #hud-date input.dob-edit {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180,210,255,0.28);
      color: rgba(255,255,255,0.65);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 3px;
      text-align: center;
      width: 108px;
      outline: none;
      padding: 0 2px 3px;
      cursor: text;
    }
    #hud-date input.dob-edit::placeholder { color: rgba(255,255,255,0.18); }
    #hud-date .dob-hint {
      display: block;
      font-size: 7px;
      letter-spacing: 2px;
      color: rgba(180,210,255,0.22);
      margin-top: 5px;
      text-align: center;
    }
    .ic-view-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
    }
    .ic-view-btn {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.32);
      background: rgba(180,210,255,0.04);
      border: 1px solid rgba(180,210,255,0.12);
      border-radius: 2px;
      padding: 5px 12px;
      cursor: pointer;
      pointer-events: all;
      transition: color .2s, background .2s, border-color .2s;
    }
    .ic-view-btn:hover {
      color: rgba(210,225,255,0.6);
      border-color: rgba(180,210,255,0.22);
    }
    .ic-view-btn.active {
      color: rgba(255,255,255,0.85);
      background: rgba(180,210,255,0.14);
      border-color: rgba(180,210,255,0.4);
    }
    .ic-correlation {
      font-size: 11px;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(180,210,240,0.62);
      letter-spacing: 0.1px;
      padding: 12px 14px;
      margin-bottom: 18px;
      background: rgba(180,210,255,0.05);
      border-left: 2px solid rgba(180,210,255,0.28);
      border-radius: 0 2px 2px 0;
    }
    #hud-back {
      position: absolute;
      bottom: 30px; left: 32px;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: none;
      pointer-events: all;
      opacity: 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding-bottom: 2px;
      transition: color .2s;
    }
    #hud-back:hover { color: rgba(255,255,255,0.55); }

    /* ── Info card ───────────────────────────────────── */
    #info-card {
      position: fixed;
      bottom: 60px;
      left: 50%;
      width: min(480px, 92vw);
      max-height: 72vh;
      overflow-y: auto;
      background: rgba(4, 7, 22, 0.88);
      border: 1px solid rgba(180,210,255,0.11);
      border-radius: 2px;
      padding: 22px 26px 24px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 30;
      pointer-events: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,210,255,0.12) transparent;
    }
    #info-card::after {
      content: '';
      position: absolute;
      top: 0; left: 28px; right: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,210,255,0.35), transparent);
    }
    .ic-arcana {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      font-weight: 300;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(160,200,255,0.55);
      margin-bottom: 9px;
    }
    .ic-name {
      font-size: 19px;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.3px;
      margin-bottom: 18px;
    }
    .ic-rule {
      width: 22px;
      height: 1px;
      background: rgba(180,210,255,0.18);
      margin-bottom: 16px;
    }
    .ic-desc {
      font-size: 11.5px;
      font-weight: 300;
      line-height: 1.88;
      color: rgba(180,210,240,0.5);
      letter-spacing: 0.1px;
    }
    .ic-heading {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.2px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .ic-sections { display: flex; flex-direction: column; gap: 0; }
    .ic-section { margin-bottom: 16px; }
    .ic-section:last-child { margin-bottom: 0; }
    .ic-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 6.5px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(160,200,255,0.38);
      margin-bottom: 7px;
    }
    .ic-section-state { padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .ic-state-label-positive { color: rgba(130,220,170,0.55); }
    .ic-state-label-negative { color: rgba(230,130,130,0.55); }
    .ic-section-body {
      font-size: 11px;
      font-weight: 300;
      line-height: 1.95;
      color: rgba(180,210,240,0.48);
      letter-spacing: 0.1px;
    }

    /* ── Program banner ─────────────────────────────── */
    #prog-banner {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(105%);
      width: min(720px, 96vw);
      max-height: 54vh;
      background: rgba(3, 5, 18, 0.93);
      border: 1px solid rgba(180,210,255,0.1);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 30px 38px 40px;
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      overflow-y: auto;
      z-index: 50;
      pointer-events: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,210,255,0.15) transparent;
    }
    #prog-banner.open { pointer-events: all; }
    .pb-full-section { margin-bottom: 28px; }
    .pb-full-section:last-child { margin-bottom: 0; }
    .pb-full-label {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      letter-spacing: 3px;
      margin-bottom: 10px;
      opacity: 0.75;
    }
    .pb-full-text {
      font-size: 12px;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(190,215,245,0.60);
      letter-spacing: 0.1px;
    }
    #prog-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 36px; right: 36px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,210,255,0.28), transparent);
    }
    .pb-close {
      position: absolute;
      top: 20px; right: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 2.5px;
      color: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: color .2s;
      text-transform: uppercase;
    }
    .pb-close:hover { color: rgba(255,255,255,0.65); }
    .pb-prog-name {
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(180,210,255,0.32); margin-bottom: 16px;
    }
    .pb-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 3.5px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .pb-heading {
      font-size: 17px; font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.2px; line-height: 1.5;
      margin-bottom: 22px;
    }
    .pb-body {
      font-size: 11.5px; font-weight: 300;
      line-height: 2.05; color: rgba(180,210,240,0.5);
      letter-spacing: 0.1px;
    }
    /* orbiting star labels */
    .orbit-tag { pointer-events: none; }
    .orbit-inner {
      transform: scale(0.45);
      transform-origin: center top;
      opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
      will-change: transform, opacity;
      text-align: center;
    }
    .orbit-tag.lit .orbit-inner { transform: scale(1); opacity: 1; }
    .orbit-label {
      font-family: 'DM Mono', monospace;
      font-size: 6.5px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 0 10px rgba(200,220,255,0.5);
      white-space: nowrap;
    }
    /* planet name tags */
    .planet-tag { pointer-events: none; }
    .planet-inner {
      transform: scale(0.5);
      transform-origin: center top;
      opacity: 0;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      text-align: center;
    }
    .planet-tag.lit .planet-inner { transform: scale(1); opacity: 1; }
    .planet-name {
      font-size: 9px; font-family: 'DM Mono', monospace; font-weight: 300;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      text-shadow: 0 0 14px rgba(200,220,255,0.6);
      white-space: nowrap;
    }
    .planet-nums {
      font-size: 6.5px; font-family: 'DM Mono', monospace;
      color: rgba(255,255,255,0.3); letter-spacing: 1.5px; margin-top: 4px;
    }

    /* ── Loader ──────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #01030d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 200;
    }
    #loader .l-word {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.38);
    }
    #loader .l-track {
      width: 72px;
      height: 1px;
      background: rgba(180,210,255,0.1);
      overflow: hidden;
    }
    #loader .l-fill {
      height: 100%;
      background: rgba(180,210,255,0.55);
      animation: lf 1.6s cubic-bezier(.4,0,.2,1) forwards;
      width: 0;
    }
    @keyframes lf { to { width: 100%; } }

    /* ── Nebula veil ─────────────────────────────────── */
    #veil {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="l-word">Destiny Matrix</div>
  <div class="l-track"><div class="l-fill"></div></div>
</div>

<!-- WebGL canvas -->
<canvas id="scene"></canvas>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Node overlays (positioned via JS each frame) -->
<div id="overlay"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-label">Destiny Matrix</div>
  <div id="hud-credit">CREATED BY NIKO</div>
  <div id="hud-date">08 · 05 · 2002</div>
  <div id="hud-back" id="hud-back">← Return</div>
</div>

<!-- Nebula veil — covers screen when flying into a star -->
<div id="veil"></div>

<!-- Program section banner (slides up from bottom when orbiting star clicked) -->
<div id="prog-banner">
  <div class="pb-close" id="pb-close">CLOSE ✕</div>
  <div class="pb-prog-name" id="pb-prog-name"></div>
  <div class="pb-section-label" id="pb-section-label"></div>
  <div class="pb-heading" id="pb-heading"></div>
  <div class="pb-body" id="pb-body"></div>
</div>

<!-- Info card -->
<div id="info-card">
  <div class="ic-arcana"  id="ic-arcana"></div>
  <div class="ic-name"    id="ic-name"></div>
  <div class="ic-rule"></div>
  <div class="ic-view-toggle" id="ic-view-toggle">
    <div class="ic-view-btn" id="ic-view-standard">Standard</div>
    <div class="ic-view-btn" id="ic-view-law">Law</div>
  </div>
  <div class="ic-correlation" id="ic-correlation" style="display:none"></div>
  <div class="ic-heading" id="ic-heading"></div>
  <div class="ic-sections" id="ic-sections">
    <div class="ic-section" id="ic-sec-why">
      <div class="ic-section-label">The Why</div>
      <div class="ic-section-body" id="ic-why"></div>
    </div>
    <div class="ic-section" id="ic-sec-shadow">
      <div class="ic-section-label">The Shadow</div>
      <div class="ic-section-body" id="ic-shadow"></div>
    </div>
    <div class="ic-section" id="ic-sec-path">
      <div class="ic-section-label">The Path</div>
      <div class="ic-section-body" id="ic-path"></div>
    </div>
    <div class="ic-section ic-section-state" id="ic-sec-positive">
      <div class="ic-section-label ic-state-label-positive">Positive State</div>
      <div class="ic-section-body" id="ic-positive"></div>
    </div>
    <div class="ic-section ic-section-state" id="ic-sec-negative">
      <div class="ic-section-label ic-state-label-negative">Negative State</div>
      <div class="ic-section-body" id="ic-negative"></div>
    </div>
  </div>
  <div class="ic-desc" id="ic-desc" style="display:none"></div>
</div>

<script src="js/calculator.js"></script>
<script src="js/arcana.js"></script>
<script src="js/programs.js"></script>
<script src="js/micro-content.js"></script>
<script src="js/matrix-engine.js"></script>
<script src="js/talent-content.js"></script>
<script src="js/universal-law-content.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
(function () {
'use strict';

// ── NODE DATA ──────────────────────────────────────────────────────────────
const NODES = [
  {
    key: 'A', num: 8, arcana: 'VIII',
    label: 'Core Character',
    desc: 'Your Day of Birth — the psychological portrait you were born wearing. Arcana VIII, Justice: a persona built on truth, balance and the knowledge that every cause carries its effect.',
    pos: new THREE.Vector3( -3.7,  0,   0 ),
    twk: { spd: 1.1, off: 0.0 },
    color: 0xFFCC44,   // warm gold — strength, karma, discipline
    soul: false,
  },
  {
    key: 'B', num: 5, arcana: 'V',
    label: 'Sky Line',
    desc: 'Your spiritual potential and divine talents — the channel that reaches upward. Arcana V, the Hierophant: sacred law, inherited wisdom and the gift of turning higher order into teaching.',
    pos: new THREE.Vector3(  0,  3.7,   0 ),
    twk: { spd: 0.9, off: 1.4 },
    color: 0x44AAFF,   // electric blue — will, direction, clarity
    soul: false,
  },
  {
    key: 'C', num: 4, arcana: 'IV',
    label: 'Earth Line',
    desc: 'Your Year of Birth — material and financial potential. Arcana IV, the Emperor: structure, sovereignty and the power to build lasting wealth and protect what you create.',
    pos: new THREE.Vector3(  3.7,  0,   0 ),
    twk: { spd: 1.3, off: 2.8 },
    color: 0x44FFAA,   // emerald — earth, roots, ancestral ground
    soul: false,
  },
  {
    key: 'D', num: 17, arcana: 'XVII',
    label: 'Karmic Tail',
    desc: 'Your karmic tail — the past-life lesson carried into this incarnation. Arcana XVII, the Star: talent once hidden or dimmed; the soul\'s task is to reclaim its visibility and let the light be seen.',
    pos: new THREE.Vector3(  0, -3.7,   0 ),
    twk: { spd: 1.0, off: 4.2 },
    color: 0xCC66FF,   // soft violet — the Star, celestial vision, renewal
    soul: false,
  },
  {
    key: 'E', num: 7, arcana: 'VII',
    label: 'Soul Center',
    desc: 'Your comfort zone and soul center — the foundation everything else is built upon. Arcana VII, the Chariot: inner will and direction, the star you were born steering toward.',
    pos: new THREE.Vector3(  0,    0,   0 ),
    twk: { spd: 0.7, off: 3.5 },
    color: 0xDDEEFF,   // cool white-blue — pure soul light
    soul: true,
  },
];

const EDGES = [
  [0,1],[1,2],[2,3],[3,0],   // outer diamond
  [0,2],[1,3],               // cross diagonals
  [0,4],[1,4],[2,4],[3,4],   // spokes to center
];

// ── RENDERER ───────────────────────────────────────────────────────────────
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: window.devicePixelRatio < 2 });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x01030d, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 12);

// ── TEXTURE BUILDERS ───────────────────────────────────────────────────────

// Star sprite: glow + two diffraction spikes + hard core
function makeNodeTex(size = 256) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const cx = cv.getContext('2d');
  const h = size / 2;

  // Wide diffuse halo
  const g1 = cx.createRadialGradient(h,h,0, h,h,h);
  g1.addColorStop(0,   'rgba(210,228,255,0.22)');
  g1.addColorStop(0.35,'rgba(190,215,255,0.07)');
  g1.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g1; cx.fillRect(0,0,size,size);

  // Inner glow
  const g2 = cx.createRadialGradient(h,h,0, h,h,h*0.28);
  g2.addColorStop(0,   'rgba(240,248,255,0.72)');
  g2.addColorStop(0.6, 'rgba(200,225,255,0.18)');
  g2.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g2; cx.fillRect(0,0,size,size);

  // Horizontal diffraction spike
  const sh = cx.createLinearGradient(0,h,size,h);
  sh.addColorStop(0,    'rgba(255,255,255,0)');
  sh.addColorStop(0.22, 'rgba(200,225,255,0.16)');
  sh.addColorStop(0.5,  'rgba(255,255,255,0.88)');
  sh.addColorStop(0.78, 'rgba(200,225,255,0.16)');
  sh.addColorStop(1,    'rgba(255,255,255,0)');
  cx.save();
  cx.strokeStyle = sh; cx.lineWidth = 1.8;
  cx.beginPath(); cx.moveTo(0,h); cx.lineTo(size,h); cx.stroke();
  cx.restore();

  // Vertical diffraction spike
  const sv = cx.createLinearGradient(h,0,h,size);
  sv.addColorStop(0,    'rgba(255,255,255,0)');
  sv.addColorStop(0.22, 'rgba(200,225,255,0.16)');
  sv.addColorStop(0.5,  'rgba(255,255,255,0.88)');
  sv.addColorStop(0.78, 'rgba(200,225,255,0.16)');
  sv.addColorStop(1,    'rgba(255,255,255,0)');
  cx.save();
  cx.strokeStyle = sv; cx.lineWidth = 1.8;
  cx.beginPath(); cx.moveTo(h,0); cx.lineTo(h,size); cx.stroke();
  cx.restore();

  // Pinpoint core
  const gc = cx.createRadialGradient(h,h,0, h,h, h*0.065);
  gc.addColorStop(0, 'rgba(255,255,255,1)');

(function buildStars() {
  const N = 6500;
  const pos  = new Float32Array(N * 3);
  const col  = new Float32Array(N * 3);
  const size = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const r   = 65 + Math.random() * 45;
    const th  = Math.random() * Math.PI * 2;
    const ph  = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);

    // Colour distribution: blue-white majority, rare warm
    const t = Math.random();
    if (t < 0.65) {                         // blue-white
      col[i*3] = 0.82 + Math.random()*0.18;
      col[i*3+1] = 0.88 + Math.random()*0.12;
      col[i*3+2] = 1.0;
    } else if (t < 0.88) {                  // pure white
      const v = 0.90 + Math.random()*0.10;
      col[i*3] = col[i*3+1] = col[i*3+2] = v;
    } else {                                 // rare warm yellow
      col[i*3] = 1.0;
      col[i*3+1] = 0.90 + Math.random()*0.08;
      col[i*3+2] = 0.70 + Math.random()*0.12;
    }

    // Most stars sub-pixel; a few slightly larger
    size[i] = Math.random() < 0.03 ? 2.0
            : Math.random() < 0.14 ? 1.2
            : 0.55 + Math.random() * 0.35;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(size, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: bgTex } },
    vertexShader: `
      attribute float aSize;
      attribute vec3 color;
      varying vec3 vColor;
      void main() {
        vColor = color;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTex;
      varying vec3 vColor;
      void main() {
        vec4 t = texture2D(uTex, gl_PointCoord);
        gl_FragColor = vec4(vColor, t.a) * t.r;
        if (gl_FragColor.a < 0.02) discard;
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  starGroup.add(new THREE.Points(geo, mat));
})();

// click handlers each live in their own IIFE with a private "which one of mine
// is zoomed" flag (_activeProgStar / _activeTalentStar) — none of them know
// about the others. Without this, a click meant to close one tier's zoom can
// hit another tier's invisible raycast target mid-transition and kick off a
// second, competing camera fly-in. Every flyTo*/return function must set this
// on entry to a zoom and clear it on return; every raycast-and-fly branch must

// touch drag pans the camera, and a second touch pinches to zoom (mobile
// fix: fixed-FOV frustum clips side content on narrow/portrait viewports,
// so touch users can drag/pinch to reveal or scale it rather than the
// diagram being shrunk to fit).
const activeTouches = new Map(); // pointerId → {x, y}
let _dragStartX = 0, _dragStartY = 0;
let _dragStartPanX = 0, _dragStartPanY = 0;
let _dragDistance = 0;

let _pinchStartDist = 0;
let _pinchStartZoom = baseCamZ;

function _pxToWorld() {
  // World-units-per-pixel is identical on both axes for a standard
  // (non-anamorphic) perspective camera — see PAN_CLAMP comment above.
  const halfH = camZoom * Math.tan(THREE.MathUtils.degToRad(25));
  return (2 * halfH) / window.innerHeight;
}

function _touchDist() {
  const pts = [...activeTouches.values()];
  return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
}

document.addEventListener('pointermove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY  + 'px';

  // Update raycaster mouse (needed for both mouse hover and touch tap hit-testing)
  mouse2D.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1,
  );

  if (e.pointerType === 'touch') {
    if (!activeTouches.has(e.pointerId)) return;
    activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (activeTouches.size >= 2) {
      // Pinch-zoom: pan is frozen while two fingers are down.
      const dist  = _touchDist();
      const scale = dist / _pinchStartDist;
      camZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, _pinchStartZoom / scale));
      wasDragging = true;
      return;
    }

    // Single finger: existing pan behavior.
    const dxPx = e.clientX - _dragStartX;
    const dyPx = e.clientY - _dragStartY;
    _dragDistance = Math.hypot(dxPx, dyPx);
    if (_dragDistance > 6) wasDragging = true;

    const pxToWorld = _pxToWorld();
    panX = Math.max(-PAN_CLAMP, Math.min(PAN_CLAMP, _dragStartPanX - dxPx * pxToWorld));
    panY = Math.max(-PAN_CLAMP, Math.min(PAN_CLAMP, _dragStartPanY + dyPx * pxToWorld));
    return;
  }

  // Mouse (non-touch): existing hover-parallax target, untouched.
  tgtX = (e.clientX / window.innerWidth  - 0.5) *  2.0;
  tgtY = (e.clientY / window.innerHeight - 0.5) * -1.3;
});

  mouse2D.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1,
  );

  wasDragging = false; // each new gesture starts clean — don't let a stale drag eat this tap
  if (isFlying || activeIdx !== -1 || activeExtraStar !== null) return;

  activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activeTouches.size === 2) {
    _pinchStartDist = _touchDist();
    _pinchStartZoom = camZoom;
  } else if (activeTouches.size === 1) {
    _dragStartX     = e.clientX;
    _dragStartY     = e.clientY;
    _dragStartPanX  = panX;
    _dragStartPanY  = panY;
    _dragDistance   = 0;
  }
});

document.addEventListener('pointerup', e => {
  activeTouches.delete(e.pointerId);
  if (activeTouches.size === 1) {
    // Dropped from a pinch (or a stray second touch) back to one finger —
    // resume panning from here instead of jumping to the old baseline.
    const [remaining] = activeTouches.values();
    _dragStartX    = remaining.x;
    _dragStartY    = remaining.y;
    _dragStartPanX = panX;
    _dragStartPanY = panY;
    _dragDistance  = 0;
  }
});

// ── CLICK ─────────────────────────────────────────────────────────────────
canvas.addEventListener('click', () => {
  if (wasDragging) { wasDragging = false; return; } // pan gesture, not a tap

  if (isFlying) return;

  if (activeIdx !== -1) {
    // Any click while zoomed into an arcana → return to map
    returnToMap();
    return;
  }

  // A program or talent star is mid-transition or zoomed — that tier's own
  // click handler owns this click; don't start a competing arcana fly-in.
  if (activeExtraStar !== null) return;

  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(hitMeshes);
  const clickedIdx = hits.length > 0 ? hits[0].object.userData.nodeIndex : -1;
  if (clickedIdx !== -1) flyTo(clickedIdx);
});

// ── FLY TO NODE ───────────────────────────────────────────────────────────
const veil = document.getElementById('veil');

function flyTo(idx) {
  if (isFlying) return;
  isFlying  = true;
  activeIdx = idx;
  const data = NODES[idx];
  const tp   = data.pos;

  // Fade all tags + lines out
  tagEls.forEach(el => gsap.to(el, { opacity: 0, duration: 0.5 }));
  gsap.to(lineMat, { opacity: 0, duration: 0.7 });

  // Camera flies DIRECTLY at the node then blasts 12 units past it
  const overshoot = 12;
  const dir = tp.clone().normalize();
  const destX = tp.x + dir.x * overshoot;
  const destY = tp.y + dir.y * overshoot;
  const destZ = tp.z - overshoot; // always travel inward on Z too

  // Phase 1 (0 → 1.9s): approach, camera accelerates toward the star
  gsap.to(camera.position, {
    x: tp.x, y: tp.y, z: tp.z,
    duration: 1.9,
    ease: 'power2.in',
    onUpdate() { camera.lookAt(tp.x, tp.y, tp.z); },
    onComplete() {
      // Phase 2 (1.9 → 2.6s): blast through into the nebula
      gsap.to(camera.position, {
        x: destX, y: destY, z: destZ,
        duration: 0.7,
        ease: 'power3.out',
        onUpdate() { camera.lookAt(tp.x, tp.y, tp.z); },
        onComplete() {
          isFlying = false;
          showCard(idx);
          gsap.to('#hud-back', { opacity: 1, duration: 0.6 });
        },
      });
    },
  });

  baseCamX = destX;
  baseCamY = destY;

  // Star blooms huge as camera closes in, hides after pass-through
  gsap.to(data.sprite.scale, {
    x: data.baseScale * 22,
    y: data.baseScale * 22,
    duration: 1.9,
    ease: 'power2.in',
  });
  gsap.to(data.sprite.material, {
    opacity: 0,
    duration: 0.25,
    delay: 1.75,
    onComplete() { data.sprite.visible = false; },
  });

  // Veil: flash brilliant white at the moment of entry, then settle to node colour
  const hex = '#' + new THREE.Color(data.color).getHexString();
  veil.style.background = [
    `radial-gradient(ellipse at center,`,
    `  #ffffff 0%,`,
    `  ${hex}cc 18%,`,
    `  ${hex}55 50%,`,
    `  transparent 80%)`,
  ].join('');
  gsap.to(veil, { opacity: 1, duration: 0.18, delay: 1.82,
    onComplete() {
      // Dim to a soft ambient nebula glow
      veil.style.background = [
        `radial-gradient(ellipse at center,`,
        `  ${hex}22 0%,`,
        `  ${hex}10 45%,`,
        `  transparent 75%)`,
      ].join('');
      gsap.to(veil, { opacity: 1, duration: 0.6 });
    },
  });
}

function returnToMap(onDone) {
  if (isFlying) return;
  isFlying = true;
  hideCard();
  currentMatrixView = 'STANDARD'; // always reopen fresh cards on Standard, never sticky
  panX = 0; panY = 0; camZoom = baseCamZ; // recenter pan/zoom on every return to the map
  gsap.to('#hud-back', { opacity: 0, duration: 0.25 });
  // Clear any hover highlight immediately
  if (hoveredIdx !== -1) {
    tagEls[hoveredIdx].classList.remove('lit');
    hoveredIdx = -1;
  }

  const prevIdx = activeIdx;
  activeIdx = -1;

  // Fade veil out
  gsap.to(veil, { opacity: 0, duration: 1.0 });

  // Restore previous star before flying back
  if (prevIdx !== -1) {
    const d = NODES[prevIdx];
    d.sprite.visible = true;
    d.sprite.material.opacity = 0;
    gsap.to(d.sprite.scale, { x: d.baseScale, y: d.baseScale, duration: 0 });
    gsap.to(d.sprite.material, { opacity: 0.78, duration: 1.0, delay: 0.3 });
  }

  gsap.to(camera.position, {
    x: 0, y: 0, z: baseCamZ,
    duration: 2.0, ease: 'power2.inOut',
    onUpdate() { camera.lookAt(0, 0, 0); },
    onComplete() {
      isFlying = false;
      baseCamX = 0;
      baseCamY = 0;
      tagEls.forEach(el => gsap.to(el, { opacity: 1, duration: 0.5 }));
      gsap.to(lineMat, { opacity: 0.11, duration: 1.0 });
      if (onDone) onDone();
    },
  });
}

// ── PROJECTION ────────────────────────────────────────────────────────────
const _pv = new THREE.Vector3();
function toScreen(v3) {
  _pv.copy(v3).project(camera);
  return {
    x: (_pv.x  + 1) * 0.5 * window.innerWidth,
    y: (-_pv.y + 1) * 0.5 * window.innerHeight,
  };
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // ─ Parallax damping
  offX += (tgtX - offX) * 0.042;
  offY += (tgtY - offY) * 0.042;

  if (!isFlying && activeIdx === -1) {
    camera.position.x = baseCamX + offX + panX;
    camera.position.y = baseCamY + offY + panY;
    camera.position.z = camZoom;
    camera.lookAt(offX * 0.12 + panX, offY * 0.12 + panY, 0);
  }

  // ─ Background star rotation (independent of nodes)
  starGroup.rotation.y = t * 0.00045;
  starGroup.rotation.x = Math.sin(t * 0.00028) * 0.018;

  // ─ Hover detection
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(hitMeshes);
  const newHover = hits.length > 0 ? hits[0].object.userData.nodeIndex : -1;

  if (newHover !== hoveredIdx) {
    if (hoveredIdx !== -1 && hoveredIdx !== activeIdx) {
      tagEls[hoveredIdx].classList.remove('lit');
      cursor.classList.remove('on-star');
      if (activeIdx === -1) {
        const d = NODES[hoveredIdx];
        gsap.to(d.sprite.scale, { x: d.baseScale, y: d.baseScale, duration: 0.5 });
      }
    }
    hoveredIdx = newHover;
    if (hoveredIdx !== -1) {
      tagEls[hoveredIdx].classList.add('lit');
      cursor.classList.add('on-star');
      if (activeIdx === -1) {
        const d = NODES[hoveredIdx];
        gsap.to(d.sprite.scale, {
          x: d.baseScale * 1.6, y: d.baseScale * 1.6, duration: 0.4,
        });
      }
    } else {
      cursor.classList.remove('on-star');
    }
  }

  // ─ Twinkle + update label positions
  NODES.forEach((data, i) => {
    const tw = Math.sin(t * data.twk.spd + data.twk.off);
    // Don't overwrite opacity while GSAP is fading the star during fly-in
    if (data.sprite.visible && !(isFlying && i === activeIdx)) {
      data.sprite.material.opacity = 0.78 + tw * 0.22;
    }

    // Update HTML tag position (below the star)
    const sc = toScreen(data.pos);
    const tag = tagEls[i];
    tag.style.left = sc.x + 'px';
    tag.style.top  = (sc.y + 38) + 'px';
  });

  // ─ Ambient effects (electrons + quantum particles)
  if (window._ambientUpdate) window._ambientUpdate(t);

  renderer.render(scene, camera);
}

// ── RESIZE ────────────────────────────────────────────────────────────────
// Mobile fix: opening the on-screen keyboard for the DOB edit input shrinks
// window.innerHeight, which used to fire this same handler and re-fit the
// camera/renderer to the shrunken viewport — visually "zooming"/distorting
// the whole scene. Skip the refit entirely while that input is focused.
window.addEventListener('resize', () => {
  if (document.activeElement && document.activeElement.classList.contains('dob-edit')) return;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── DOB INPUT ─────────────────────────────────────────────────────────────
const hudDate = document.getElementById('hud-date');

// Track current parsed date so we can restore on invalid input
let _dob = { day: 8, month: 5, yearFull: 2002 };

function toRoman(n) {
  return ['I','II','III','IV','V','VI','VII','VIII','IX','X',
          'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX',
          'XXI','XXII'][n - 1] || String(n);
}

function fmtDate(d, m, y) {
  return `${String(d).padStart(2,'0')} · ${String(m).padStart(2,'0')} · ${y}`;
}

function applyNewDate(dateStr) {
  if (!window.DMCalc) return false;
  try {
    const matrix = window.DMCalc.matrixFromDate(dateStr);
    const p = matrix.positions;

    // NODES order: [0]=top(A=day), [1]=right(B=month), [2]=bottom(C=year),
    //              [3]=left(D=karmic tail), [4]=center(G=soul)
    [p.A, p.B, p.C, p.D, p.G].forEach((pos, i) => {
      const val = pos.value;
      NODES[i].num    = val;
      NODES[i].arcana = toRoman(val);

      // Swap arcana reading into label/desc if arcana.js is loaded
      if (window.DMArcana) {
        try {
          const a = window.DMArcana.getArcana(val);
          NODES[i].desc = a.identity.split('. ')[0] + '.';
        } catch (_) {}
      }

      // Fade number out → update → fade in
      const numEl = tagEls[i].querySelector('.t-num');
      gsap.to(numEl, {
        opacity: 0, duration: 0.22,
        onComplete() {
          numEl.textContent = val;
          gsap.to(numEl, { opacity: 1, duration: 0.35 });
        },
      });
    });

    _dob = matrix.input;
    hudDate.textContent = fmtDate(_dob.day, _dob.month, _dob.yearFull);
    appendHint();
    return true;
  } catch (e) {
    return false;
  }
}

function appendHint() {
  // Small "tap to change" label beneath the date — only visible on hover via CSS
  const existing = hudDate.querySelector('.dob-hint');
  if (!existing) {
    const hint = document.createElement('span');
    hint.className = 'dob-hint';
    hint.textContent = 'tap to change';
    hudDate.appendChild(hint);
  }
}

function openDateEdit() {
  if (hudDate.querySelector('input')) return; // already open

  const saved = fmtDate(_dob.day, _dob.month, _dob.yearFull);
  const editVal = `${String(_dob.day).padStart(2,'0')}/${String(_dob.month).padStart(2,'0')}/${_dob.yearFull}`;

  hudDate.textContent = '';
  const inp = document.createElement('input');
  inp.type        = 'text';
  inp.className   = 'dob-edit';
  inp.value       = editVal;
  inp.placeholder = 'DD/MM/YYYY';
  hudDate.appendChild(inp);
  inp.focus();
  inp.select();

  function commit() {
    const raw = inp.value.trim();
    if (!applyNewDate(raw)) {
      // Invalid — restore original display
      hudDate.textContent = saved;
      appendHint();
    }
  }

  inp.addEventListener('input', () => {
    const digits = inp.value.replace(/\D/g, '').slice(0, 8);
    let out = digits;
    if (digits.length > 4) {
      out = digits.slice(0, 2) + '/' + digits.slice(2, 4) + '/' + digits.slice(4);
    } else if (digits.length > 2) {
      out = digits.slice(0, 2) + '/' + digits.slice(2);
    }
    inp.value = out;
    if (digits.length === 8) inp.blur(); // full DD/MM/YYYY typed — commit automatically
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { inp.blur(); }
    if (e.key === 'Escape') { hudDate.textContent = saved; appendHint(); }
  });
  inp.addEventListener('blur', commit);
}

hudDate.addEventListener('click', openDateEdit);
appendHint();
