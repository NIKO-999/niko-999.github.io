<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destiny Matrix · 08.05.2002</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #01030d;
      font-family: 'Inter', sans-serif;
      cursor: none;
    }

    canvas#scene {
      display: block;
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    /* ── Custom cursor ───────────────────────────────── */
    #cursor {
      position: fixed;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      will-change: transform;
      transition: width .18s, height .18s, background .18s, border .18s;
    }
    #cursor.on-star {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.36);
    }

    /* ── Node overlays ───────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    .node-tag {
      position: absolute;
      text-align: center;
      transform: translate(-50%, 0);
      pointer-events: all;
      cursor: none;
    }
    .node-tag .t-num {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 0 0 14px rgba(180,220,255,0.7);
      transition: opacity .5s;
    }
    .node-tag .t-label {
      font-size: 7.5px;
      font-weight: 400;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.42);
      margin-top: 6px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .4s;
    }
    .node-tag.lit .t-label { opacity: 1; }

    /* ── Minimal HUD ─────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    #hud-label {
      position: absolute;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      white-space: nowrap;
    }
    #hud-date {
      position: absolute;
      bottom: 30px; right: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.14);
      pointer-events: all;
      cursor: none;
      transition: color .25s;
    }
    #hud-date:hover { color: rgba(255,255,255,0.38); }

    /* DOB inline edit — native <input type="date">. Real 16px font (not a
       scale-transform trick) is the only reliable way to stop iOS Safari /
       Chrome mobile auto-zooming the page on focus; anything under 16px
       (this used to be 9px) triggers that native browser zoom regardless
       of viewport meta settings, and it has no relation to the JS camera.
       color-scheme:dark tells the browser to render its own picker chrome
       (calendar icon, etc.) in a dark-UI-friendly variant instead of the
       default light one, which would otherwise look out of place / hard
       to see against this theme. */
    #hud-date input.dob-edit {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180,210,255,0.28);
      color: rgba(255,255,255,0.65);
      color-scheme: dark;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
      padding: 2px 6px 3px;
      cursor: pointer;
    }
    #hud-date .dob-hint {
      display: block;
      font-size: 7px;
      letter-spacing: 2px;
      color: rgba(180,210,255,0.22);
      margin-top: 5px;
      text-align: center;
    }
    .ic-view-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
    }
    .ic-view-btn {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.32);
      background: rgba(180,210,255,0.04);
      border: 1px solid rgba(180,210,255,0.12);
      border-radius: 2px;
      padding: 5px 12px;
      cursor: pointer;
      pointer-events: all;
      transition: color .2s, background .2s, border-color .2s;
    }
    .ic-view-btn:hover {
      color: rgba(210,225,255,0.6);
      border-color: rgba(180,210,255,0.22);
    }
    .ic-view-btn.active {
      color: rgba(255,255,255,0.85);
      background: rgba(180,210,255,0.14);
      border-color: rgba(180,210,255,0.4);
    }
    .ic-correlation {
      font-size: 11px;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(180,210,240,0.62);
      letter-spacing: 0.1px;
      padding: 12px 14px;
      margin-bottom: 18px;
      background: rgba(180,210,255,0.05);
      border-left: 2px solid rgba(180,210,255,0.28);
      border-radius: 0 2px 2px 0;
    }
    #hud-back {
      position: absolute;
      bottom: 30px; left: 32px;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: none;
      pointer-events: all;
      opacity: 0;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding-bottom: 2px;
      transition: color .2s;
    }
    #hud-back:hover { color: rgba(255,255,255,0.55); }

    /* ── Star Index (collapsible quick-nav) ──────────── */
    #star-index {
      position: absolute;
      top: 22px; left: 24px;
      pointer-events: all;
      z-index: 25;
      width: 168px;
      max-width: calc(100vw - 48px);
    }
    #si-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      user-select: none;
      transition: color .2s;
    }
    #si-toggle:hover { color: rgba(255,255,255,0.55); }
    #si-toggle .si-chevron {
      display: inline-block;
      font-size: 7px;
      transition: transform .3s ease;
      transform: rotate(-90deg);
    }
    #star-index.open #si-toggle .si-chevron { transform: rotate(0deg); }
    #si-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .35s ease, opacity .25s ease;
      margin-top: 7px;
      background: rgba(4, 7, 22, 0.88);
      border: 1px solid rgba(180,210,255,0.11);
      border-radius: 2px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    #star-index.open #si-panel {
      max-height: min(55vh, 380px);
      opacity: 1;
    }
    #si-search {
      display: block;
      width: 100%;
      box-sizing: border-box;
      background: rgba(180,210,255,0.05);
      border: none;
      border-bottom: 1px solid rgba(180,210,255,0.12);
      color: rgba(255,255,255,0.75);
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.4px;
      padding: 7px 9px;
      outline: none;
    }
    #si-search::placeholder { color: rgba(180,210,255,0.28); }
    #si-list {
      max-height: min(45vh, 300px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,210,255,0.14) transparent;
      padding: 3px 0 6px;
    }
    .si-group-label {
      font-family: 'DM Mono', monospace;
      font-size: 5.5px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(160,200,255,0.35);
      padding: 7px 9px 3px;
    }
    .si-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 4px 9px;
      cursor: pointer;
      transition: background .15s;
    }
    .si-row:hover { background: rgba(180,210,255,0.08); }
    .si-num {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      font-weight: 400;
      flex-shrink: 0;
      width: 15px;
    }
    .si-label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.15px;
      color: rgba(210,225,255,0.68);
      line-height: 1.25;
    }
    .si-empty {
      padding: 10px 9px;
      font-size: 8.5px;
      color: rgba(180,210,255,0.3);
      font-style: italic;
    }

    /* ── Info card ───────────────────────────────────── */
    #info-card {
      position: fixed;
      bottom: 60px;
      left: 50%;
      width: min(480px, 92vw);
      max-height: 72vh;
      overflow-y: auto;
      background: rgba(4, 7, 22, 0.88);
      border: 1px solid rgba(180,210,255,0.11);
      border-radius: 2px;
      padding: 22px 26px 24px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 30;
      pointer-events: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,210,255,0.12) transparent;
    }
    #info-card::after {
      content: '';
      position: absolute;
      top: 0; left: 28px; right: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,210,255,0.35), transparent);
    }
    .ic-arcana {
      font-family: 'DM Mono', monospace;
      font-size: 7.5px;
      font-weight: 300;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(160,200,255,0.55);
      margin-bottom: 9px;
    }
    .ic-name {
      font-size: 19px;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.3px;
      margin-bottom: 18px;
    }
    .ic-rule {
      width: 22px;
      height: 1px;
      background: rgba(180,210,255,0.18);
      margin-bottom: 16px;
    }
    .ic-desc {
      font-size: 11.5px;
      font-weight: 300;
      line-height: 1.88;
      color: rgba(180,210,240,0.5);
      letter-spacing: 0.1px;
    }
    .ic-heading {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.2px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .ic-sections { display: flex; flex-direction: column; gap: 0; }
    .ic-section { margin-bottom: 16px; }
    .ic-section:last-child { margin-bottom: 0; }
    .ic-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 6.5px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(160,200,255,0.38);
      margin-bottom: 7px;
    }
    .ic-section-state { padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
    .ic-state-label-positive { color: rgba(130,220,170,0.55); }
    .ic-state-label-negative { color: rgba(230,130,130,0.55); }
    .ic-section-body {
      font-size: 11px;
      font-weight: 300;
      line-height: 1.95;
      color: rgba(180,210,240,0.48);
      letter-spacing: 0.1px;
    }

    /* ── Program banner ─────────────────────────────── */
    #prog-banner {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(105%);
      width: min(720px, 96vw);
      max-height: 54vh;
      background: rgba(3, 5, 18, 0.93);
      border: 1px solid rgba(180,210,255,0.1);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 30px 38px 40px;
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      overflow-y: auto;
      z-index: 50;
      pointer-events: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(180,210,255,0.15) transparent;
    }
    #prog-banner.open { pointer-events: all; }
    .pb-full-section { margin-bottom: 28px; }
    .pb-full-section:last-child { margin-bottom: 0; }
    .pb-full-label {
      font-family: 'DM Mono', monospace;
      font-size: 7px;
      letter-spacing: 3px;
      margin-bottom: 10px;
      opacity: 0.75;
    }
    .pb-full-text {
      font-size: 12px;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(190,215,245,0.60);
      letter-spacing: 0.1px;
    }
    #prog-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 36px; right: 36px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,210,255,0.28), transparent);
    }
    .pb-close {
      position: absolute;
      top: 20px; right: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 2.5px;
      color: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: color .2s;
      text-transform: uppercase;
    }
    .pb-close:hover { color: rgba(255,255,255,0.65); }
    .pb-prog-name {
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(180,210,255,0.32); margin-bottom: 16px;
    }
    .pb-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 7px; letter-spacing: 3.5px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .pb-heading {
      font-size: 17px; font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.2px; line-height: 1.5;
      margin-bottom: 22px;
    }
    .pb-body {
      font-size: 11.5px; font-weight: 300;
      line-height: 2.05; color: rgba(180,210,240,0.5);
      letter-spacing: 0.1px;
    }

    /* orbiting star labels */
    .orbit-tag { pointer-events: none; }
    .orbit-inner {
      transform: scale(0.45);
      transform-origin: center top;
      opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
      will-change: transform, opacity;
      text-align: center;
    }
    .orbit-tag.lit .orbit-inner { transform: scale(1); opacity: 1; }
    .orbit-label {
      font-family: 'DM Mono', monospace;
      font-size: 6.5px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 0 10px rgba(200,220,255,0.5);
      white-space: nowrap;
    }
    /* planet name tags */
    .planet-tag { pointer-events: none; }
    .planet-inner {
      transform: scale(0.5);
      transform-origin: center top;
      opacity: 0;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      text-align: center;
    }
    .planet-tag.lit .planet-inner { transform: scale(1); opacity: 1; }
    .planet-name {
      font-size: 9px; font-family: 'DM Mono', monospace; font-weight: 300;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.78);
      text-shadow: 0 0 14px rgba(200,220,255,0.6);
      white-space: nowrap;
    }
    .planet-nums {
      font-size: 6.5px; font-family: 'DM Mono', monospace;
      color: rgba(255,255,255,0.3); letter-spacing: 1.5px; margin-top: 4px;
    }

    /* ── Loader ──────────────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: #01030d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 200;
    }
    #loader .l-word {
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.38);
    }
    #loader .l-track {
      width: 72px;
      height: 1px;
      background: rgba(180,210,255,0.1);
      overflow: hidden;
    }
    #loader .l-fill {
      height: 100%;
      background: rgba(180,210,255,0.55);
      animation: lf 1.6s cubic-bezier(.4,0,.2,1) forwards;
      width: 0;
    }
    @keyframes lf { to { width: 100%; } }

    /* Gate: shown instead of the progress bar when no ?dob= link was used —
       blocks the reveal until a visitor enters their own date, so a bare
       shared link never shows the page owner's own chart. */
    #loader .l-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #loader .l-gate-hint {
      font-size: 7px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(180,210,255,0.28);
    }
    /* Native <input type="date"> — same real-16px reasoning as .dob-edit. */
    #loader .l-gate-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(180,210,255,0.28);
      color: rgba(255,255,255,0.75);
      color-scheme: dark;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
      padding: 2px 6px 4px;
      cursor: pointer;
    }
    #loader .l-gate-error {
      font-size: 7px;
      letter-spacing: 1.5px;
      color: rgba(255,120,120,0.55);
      height: 9px;
    }

    /* ── Nebula veil ─────────────────────────────────── */
    #veil {
      position: fixed;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="l-word">Destiny Matrix</div>
  <div class="l-track" id="l-track"><div class="l-fill"></div></div>
  <div class="l-gate" id="l-gate" style="display:none">
    <input type="date" class="l-gate-input" id="l-gate-input">
    <div class="l-gate-hint">Enter your date of birth to reveal your matrix</div>
    <div class="l-gate-error" id="l-gate-error"></div>
  </div>
</div>

<!-- WebGL canvas -->
<canvas id="scene"></canvas>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Node overlays (positioned via JS each frame) -->
<div id="overlay"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-label">Destiny Matrix</div>
  <div id="hud-date">08 · 05 · 2002</div>
  <div id="hud-back" id="hud-back">← Return</div>

  <div id="star-index">
    <div id="si-toggle"><span class="si-chevron">▾</span><span>Star Index</span></div>
    <div id="si-panel">
      <input id="si-search" type="text" placeholder="Search stars…" autocomplete="off" />
      <div id="si-list"></div>
    </div>
  </div>
</div>

</div>

<!-- Nebula veil — covers screen when flying into a star -->
<div id="veil"></div>

<!-- Program section banner (slides up from bottom when orbiting star clicked) -->
<div id="prog-banner">
  <div class="pb-close" id="pb-close">CLOSE ✕</div>
  <div class="pb-prog-name" id="pb-prog-name"></div>
  <div class="pb-section-label" id="pb-section-label"></div>
  <div class="pb-heading" id="pb-heading"></div>
  <div class="pb-body" id="pb-body"></div>
</div>

<!-- Info card -->
<div id="info-card">
  <div class="ic-arcana"  id="ic-arcana"></div>
  <div class="ic-name"    id="ic-name"></div>
  <div class="ic-rule"></div>
  <div class="ic-view-toggle" id="ic-view-toggle">
    <div class="ic-view-btn" id="ic-view-standard">Standard</div>
    <div class="ic-view-btn" id="ic-view-law">Law</div>
  </div>
  <div class="ic-correlation" id="ic-correlation" style="display:none"></div>
  <div class="ic-heading" id="ic-heading"></div>
  <div class="ic-sections" id="ic-sections">
    <div class="ic-section" id="ic-sec-why">
      <div class="ic-section-label">The Why</div>
      <div class="ic-section-body" id="ic-why"></div>
    </div>
    <div class="ic-section" id="ic-sec-shadow">
      <div class="ic-section-label">The Shadow</div>
      <div class="ic-section-body" id="ic-shadow"></div>
    </div>
    <div class="ic-section" id="ic-sec-path">
      <div class="ic-section-label">The Path</div>
      <div class="ic-section-body" id="ic-path"></div>
    </div>
    <div class="ic-section ic-section-state" id="ic-sec-positive">
      <div class="ic-section-label ic-state-label-positive">Positive State</div>
      <div class="ic-section-body" id="ic-positive"></div>
    </div>
    <div class="ic-section ic-section-state" id="ic-sec-negative">
      <div class="ic-section-label ic-state-label-negative">Negative State</div>
      <div class="ic-section-body" id="ic-negative"></div>
    </div>
  </div>
  <div class="ic-desc" id="ic-desc" style="display:none"></div>
</div>

<script src="js/arcana.js"></script>
<script src="js/programs.js"></script>
<script src="js/micro-content.js"></script>
<script src="js/matrix-engine.js"></script>
<script src="js/talent-content.js"></script>
<script src="js/universal-law-content.js"></script>
<script src="js/karmic-debt-content.js"></script>
<script src="js/past-life-content.js"></script>
<script src="js/sexual-line-content.js"></script>
<script src="js/career-paths-content.js"></script>
<script src="js/health-map-content.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
(function () {
'use strict';

// ── NODE DATA ──────────────────────────────────────────────────────────────

// Star sprite: glow + two diffraction spikes + hard core
function makeNodeTex(size = 256) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const cx = cv.getContext('2d');
  const h = size / 2;

  // Wide diffuse halo
  const g1 = cx.createRadialGradient(h,h,0, h,h,h);
  g1.addColorStop(0,   'rgba(210,228,255,0.22)');
  g1.addColorStop(0.35,'rgba(190,215,255,0.07)');
  g1.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g1; cx.fillRect(0,0,size,size);

  // Inner glow
  const g2 = cx.createRadialGradient(h,h,0, h,h,h*0.28);
  g2.addColorStop(0,   'rgba(240,248,255,0.72)');
  g2.addColorStop(0.6, 'rgba(200,225,255,0.18)');
  g2.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g2; cx.fillRect(0,0,size,size);

  // Horizontal diffraction spike
  const sh = cx.createLinearGradient(0,h,size,h);
  sh.addColorStop(0,    'rgba(255,255,255,0)');
  sh.addColorStop(0.22, 'rgba(200,225,255,0.16)');
  sh.addColorStop(0.5,  'rgba(255,255,255,0.88)');
  sh.addColorStop(0.78, 'rgba(200,225,255,0.16)');
  sh.addColorStop(1,    'rgba(255,255,255,0)');
  cx.save();
  cx.strokeStyle = sh; cx.lineWidth = 1.8;
  cx.beginPath(); cx.moveTo(0,h); cx.lineTo(size,h); cx.stroke();
  cx.restore();

  // Vertical diffraction spike
  const sv = cx.createLinearGradient(h,0,h,size);
  sv.addColorStop(0,    'rgba(255,255,255,0)');
  sv.addColorStop(0.22, 'rgba(200,225,255,0.16)');
  sv.addColorStop(0.5,  'rgba(255,255,255,0.88)');
  sv.addColorStop(0.78, 'rgba(200,225,255,0.16)');
  sv.addColorStop(1,    'rgba(255,255,255,0)');
  cx.save();
  cx.strokeStyle = sv; cx.lineWidth = 1.8;
  cx.beginPath(); cx.moveTo(h,0); cx.lineTo(h,size); cx.stroke();
  cx.restore();

  // Pinpoint core
  const gc = cx.createRadialGradient(h,h,0, h,h, h*0.065);
  gc.addColorStop(0, 'rgba(255,255,255,1)');
  gc.addColorStop(1, 'rgba(255,255,255,0)');
  cx.fillStyle = gc; cx.fillRect(0,0,size,size);

  return new THREE.CanvasTexture(cv);
}

// Tiny background star sprite
function makeBgTex() {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 16;
  const cx = cv.getContext('2d');
  const g = cx.createRadialGradient(8,8,0, 8,8,6);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.45,'rgba(215,232,255,0.5)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g; cx.fillRect(0,0,16,16);
  return new THREE.CanvasTexture(cv);
}

// Nebula dust cloud sprite
function makeDustTex() {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 256;
  const cx = cv.getContext('2d');
  const g = cx.createRadialGradient(128,128,0, 128,128,128);
  g.addColorStop(0,   'rgba(100,130,200,0.10)');
  g.addColorStop(0.45,'rgba(60, 90,170,0.04)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  cx.fillStyle = g; cx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(cv);
}

(function buildStars() {
  const N = 6500;
  const pos  = new Float32Array(N * 3);
  const col  = new Float32Array(N * 3);
  const size = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const r   = 65 + Math.random() * 45;
    const th  = Math.random() * Math.PI * 2;
    const ph  = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);

    // Colour distribution: blue-white majority, rare warm
    const t = Math.random();
    if (t < 0.65) {                         // blue-white
      col[i*3] = 0.82 + Math.random()*0.18;
      col[i*3+1] = 0.88 + Math.random()*0.12;
      col[i*3+2] = 1.0;
    } else if (t < 0.88) {                  // pure white
      const v = 0.90 + Math.random()*0.10;
      col[i*3] = col[i*3+1] = col[i*3+2] = v;
    } else {                                 // rare warm yellow
      col[i*3] = 1.0;
      col[i*3+1] = 0.90 + Math.random()*0.08;
      col[i*3+2] = 0.70 + Math.random()*0.12;
    }

    // Most stars sub-pixel; a few slightly larger
    size[i] = Math.random() < 0.03 ? 2.0
            : Math.random() < 0.14 ? 1.2
            : 0.55 + Math.random() * 0.35;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(size, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: bgTex } },
    vertexShader: `
      attribute float aSize;
      attribute vec3 color;
      varying vec3 vColor;
      void main() {
        vColor = color;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTex;
      varying vec3 vColor;
      void main() {
        vec4 t = texture2D(uTex, gl_PointCoord);
        gl_FragColor = vec4(vColor, t.a) * t.r;
        if (gl_FragColor.a < 0.02) discard;
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  starGroup.add(new THREE.Points(geo, mat));
})();

// ── AMBIENT EFFECTS ───────────────────────────────────────────────────────
;(function buildAmbient() {

  // ── 1. ELECTRON ORBITS ─────────────────────────────────────────────────
  const ORBS = [
    { color: 0xFFCC44, tilt: new THREE.Euler(1.20,  0,  0.40), speed: 0.28 },
    { color: 0x44AAFF, tilt: new THREE.Euler(0.55,  0, -1.10), speed: 0.21 },
    { color: 0xCC66FF, tilt: new THREE.Euler(0.00, 1.05, 0.60), speed: 0.17 },
  ];
  const ORBIT_R = 5.5;
  const _electronData = [];

  ORBS.forEach(orb => {
    const tiltMtx  = new THREE.Matrix4().makeRotationFromEuler(orb.tilt);

    // Faint orbit path line — thin gray
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      const v = new THREE.Vector3(Math.cos(a) * ORBIT_R, Math.sin(a) * ORBIT_R, 0);
      v.applyMatrix4(tiltMtx);
      pts.push(v);
    }
    const lineGeoOrb = new THREE.BufferGeometry().setFromPoints(pts);
    const lineMtl    = new THREE.LineBasicMaterial({
      color: 0x888888, transparent: true, opacity: 0.18, depthWrite: false,
    });
    const orbitLine = new THREE.Line(lineGeoOrb, lineMtl);
    orbitLine.frustumCulled = false;
    scene.add(orbitLine);

    // 5 electrons per ring — tiny, black with white core using qTex-style texture
    const electrons = [];
    for (let k = 0; k < 5; k++) {
      const phase = (k / 5) * Math.PI * 2;

      const dot = new THREE.Sprite(new THREE.SpriteMaterial({
        map: nodeTex, color: 0xffffff,
        transparent: true, blending: THREE.NormalBlending,
        depthWrite: false, opacity: 0.9,
      }));
      dot.scale.set(0.18, 0.18, 1);
      dot.frustumCulled = false;
      scene.add(dot);

      electrons.push({ dot, halo: null, phase });
    }
    _electronData.push({ tiltMtx, speed: orb.speed, electrons });
  });

  // ── 2. QUANTUM PARTICLE FIELD ──────────────────────────────────────────
  // Texture: dark ring with bright white core
  const qCv = document.createElement('canvas');
  qCv.width = qCv.height = 64;
  const qCtx = qCv.getContext('2d');
  const qH = 32;
  // Dark halo ring
  const qRing = qCtx.createRadialGradient(qH,qH, qH*0.18, qH,qH, qH*0.9);
  qRing.addColorStop(0,   'rgba(0,0,0,0)');
  qRing.addColorStop(0.25,'rgba(0,0,0,0.92)');
  qRing.addColorStop(0.65,'rgba(0,0,0,0.75)');
  qRing.addColorStop(1,   'rgba(0,0,0,0)');
  qCtx.fillStyle = qRing; qCtx.fillRect(0,0,64,64);
  // White core
  const qCore = qCtx.createRadialGradient(qH,qH, 0, qH,qH, qH*0.22);
  qCore.addColorStop(0,   'rgba(255,255,255,1)');
  qCore.addColorStop(0.55,'rgba(220,235,255,0.85)');
  qCore.addColorStop(1,   'rgba(180,210,255,0)');
  qCtx.fillStyle = qCore; qCtx.fillRect(0,0,64,64);
  const qTex = new THREE.CanvasTexture(qCv);

  const QN    = 300;
  const qPos  = new Float32Array(QN * 3);
  const qVel  = new Float32Array(QN * 3);
  const qSize = new Float32Array(QN);

  for (let i = 0; i < QN; i++) {
    const r  = 4 + Math.random() * 10;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    qPos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    qPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    qPos[i*3+2] = r * Math.cos(ph);

    const vr  = 0.004 + Math.random() * 0.006;
    const vth = Math.random() * Math.PI * 2;
    const vph = Math.acos(2 * Math.random() - 1);
    qVel[i*3]   = vr * Math.sin(vph) * Math.cos(vth);
    qVel[i*3+1] = vr * Math.sin(vph) * Math.sin(vth);
    qVel[i*3+2] = vr * Math.cos(vph);

    qSize[i] = 3.0 + Math.random() * 2.5;  // small but visible
  }

  const qGeo = new THREE.BufferGeometry();
  qGeo.setAttribute('position', new THREE.BufferAttribute(qPos, 3));
  qGeo.setAttribute('aSize',    new THREE.BufferAttribute(qSize, 1));

  const qMat = new THREE.ShaderMaterial({
    uniforms: { uTex: { value: qTex } },
    vertexShader: `
      attribute float aSize;
      void main() {
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = aSize;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTex;
      void main() {
        vec4 t = texture2D(uTex, gl_PointCoord);
        if (t.a < 0.01) discard;
        gl_FragColor = t;
      }
    `,
    transparent: true, depthWrite: false,
    blending: THREE.NormalBlending,
  });
  const qPoints = new THREE.Points(qGeo, qMat);
  scene.add(qPoints);

  // ── 3. SOUL-NODE ENERGY PULSE ──────────────────────────────────────────
  const pulsePts = [];
  for (let i = 0; i <= 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    pulsePts.push(new THREE.Vector3(Math.cos(a), Math.sin(a), 0));
  }
  const pulseGeo = new THREE.BufferGeometry().setFromPoints(pulsePts);
  const pulseMat = new THREE.LineBasicMaterial({
    color: 0xaaaaaa, transparent: true, opacity: 0, depthWrite: false,
  });
  const pulseLine = new THREE.Line(pulseGeo, pulseMat);
  pulseLine.scale.set(0.5, 0.5, 1);
  scene.add(pulseLine);

  function firePulse() {
    gsap.set(pulseLine.scale, { x:0.5, y:0.5, z:1 });
    gsap.set(pulseMat, { opacity:0 });
    gsap.to(pulseLine.scale, { x:7, y:7, z:1, duration:2.8, ease:'power1.out' });
    gsap.to(pulseMat,        { opacity:0.80, duration:0.25,
      onComplete() { gsap.to(pulseMat, { opacity:0, duration:2.5 }); }
    });
    gsap.delayedCall(4.2, firePulse);
  }
  gsap.delayedCall(1.5, firePulse);

  // ── 4. SHOOTING STARS ─────────────────────────────────────────────────
  const shootGeo = new THREE.BufferGeometry();
  const shootPts = new Float32Array(6); // 2 points × 3
  shootGeo.setAttribute('position', new THREE.BufferAttribute(shootPts, 3));
  const shootMat = new THREE.LineBasicMaterial({
    color: 0xddeeff, transparent: true, opacity: 0, depthWrite: false,
  });
  const shootLine = new THREE.Line(shootGeo, shootMat);
  scene.add(shootLine);

  function fireShoot() {
    // Random point on a sphere shell at radius 40, biased toward visible area
    const th = (Math.random() - 0.5) * Math.PI * 0.9;
    const ph = (Math.random() - 0.5) * Math.PI * 0.5;
    const r  = 40;
    const sx = r * Math.cos(ph) * Math.cos(th);
    const sy = r * Math.sin(ph);
    const sz = r * Math.cos(ph) * Math.sin(th) - 20;
    // Direction: across the field of view
    const dx = (Math.random() - 0.5) * 14;
    const dy = (Math.random() - 0.5) * 10;
    const dz = -3;

    const pos = shootGeo.attributes.position.array;
    pos[0]=sx;   pos[1]=sy;   pos[2]=sz;
    pos[3]=sx;   pos[4]=sy;   pos[5]=sz;
    shootGeo.attributes.position.needsUpdate = true;

    gsap.set(shootMat, { opacity:0 });
    // Animate head
    const head = { x:sx, y:sy, z:sz };
    const tail = { x:sx, y:sy, z:sz };
    gsap.to(head, { x:sx+dx, y:sy+dy, z:sz+dz, duration:0.35, ease:'power1.in',
      onUpdate() {
        pos[3]=head.x; pos[4]=head.y; pos[5]=head.z;
        shootGeo.attributes.position.needsUpdate = true;
      },
    });
    gsap.to(tail, { x:sx+dx*0.7, y:sy+dy*0.7, z:sz+dz*0.7, duration:0.35, delay:0.08, ease:'power1.in',
      onUpdate() {
        pos[0]=tail.x; pos[1]=tail.y; pos[2]=tail.z;
        shootGeo.attributes.position.needsUpdate = true;
      },
    });
    gsap.to(shootMat, { opacity:0.85, duration:0.08,
      onComplete() { gsap.to(shootMat, { opacity:0, duration:0.28, delay:0.08 }); }
    });

    // Schedule next
    gsap.delayedCall(12 + Math.random() * 10, fireShoot);
  }
  gsap.delayedCall(8 + Math.random() * 6, fireShoot);

  // ── Expose update hook for animate() ──────────────────────────────────
  window._ambientUpdate = function(t) {
    // Electrons
    _electronData.forEach(orb => {
      orb.electrons.forEach(e => {
        const a   = t * orb.speed + e.phase;
        const loc = new THREE.Vector3(Math.cos(a)*ORBIT_R, Math.sin(a)*ORBIT_R, 0);
        loc.applyMatrix4(orb.tiltMtx);
        e.dot.position.copy(loc);
        if (e.halo) e.halo.position.copy(loc);
      });
    });

    // Quantum particles
    const pa = qGeo.attributes.position.array;
    for (let i = 0; i < QN; i++) {
      pa[i*3]   += qVel[i*3];
      pa[i*3+1] += qVel[i*3+1];
      pa[i*3+2] += qVel[i*3+2];
      // Wrap if too far
      const dx = pa[i*3], dy = pa[i*3+1], dz = pa[i*3+2];
      if (dx*dx + dy*dy + dz*dz > 18*18) {
        const rr = 4 + Math.random() * 3;
        const th2 = Math.random() * Math.PI * 2;
        const ph2 = Math.acos(2 * Math.random() - 1);
        pa[i*3]   = rr * Math.sin(ph2) * Math.cos(th2);
        pa[i*3+1] = rr * Math.sin(ph2) * Math.sin(th2);
        pa[i*3+2] = rr * Math.cos(ph2);
      }
    }
    qGeo.attributes.position.needsUpdate = true;
  };

})();

NODES.forEach((data, i) => {
  const sz = data.soul ? 0.70 : 0.48;

  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: nodeTex,
    color: new THREE.Color(data.color),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,

  sp.position.copy(data.pos);
  sp.scale.set(sz, sz, 1);
  scene.add(sp);
  nodeSprites.push(sp);
  data.sprite   = sp;
  data.baseScale = sz;

  // Invisible sphere for raycasting
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 8, 8),
    new THREE.MeshBasicMaterial({ visible: false }),
  );
  hit.position.copy(data.pos);
  hit.userData.nodeIndex = i;
  scene.add(hit);
  hitMeshes.push(hit);
});

// ZOOM_MAX raised from 22 to 30 — narrow portrait phones (e.g. 375×812, aspect
// ~0.46) need a fit distance of ~25.5 to show the whole diamond; the old cap
// clamped that shorter, pushing nodes off-screen instead of shrinking to fit.
const ZOOM_MIN = 6, ZOOM_MAX = 30;

// Auto-fit: derive the camera distance from the viewport's aspect ratio so
// the whole diamond (nodes sit at ±3.7 on each axis) fits on screen without
// requiring any gesture just to see it.
const FIT_HALF_EXTENT = 5.5; // world units — the ±3.7 diamond plus label/orbit breathing room
function computeFitCamZ() {
  const fovRad  = THREE.MathUtils.degToRad(25);
  const aspect  = window.innerWidth / window.innerHeight;
  const d = FIT_HALF_EXTENT / (Math.tan(fovRad) * Math.min(1, aspect));
  return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, d));
}

let   baseCamZ  = computeFitCamZ();
camera.position.z = baseCamZ; // override the placeholder set at camera creation
let   baseCamX  = 0;
let   baseCamY  = 0;
let   offX = 0, offY = 0;
let   tgtX = 0, tgtY = 0;

// Touch-only drag-to-pan (index.html mobile fix) — lets narrow/portrait
// viewports reveal content clipped by the fixed-FOV frustum without
// shrinking the diagram. Persists until returnToMap() recenters it.
let   panX = 0, panY = 0;
const PAN_CLAMP = 4.5; // world units; keeps the diagram from dragging fully off-screen
let   wasDragging = false;

// Touch-only pinch-to-zoom — dollies the camera along Z between fingers.
// Kept as a bonus on top of the auto-fit base distance, not required for it.
let   camZoom = baseCamZ;

let isFlying  = false;
let activeIdx = -1;
let hoveredIdx = -1;

// ── UNIVERSAL LAW DATA MATRIX (Part 14/15) ──────────────────────────────
// Each arcana has exactly one curated law match (DUniversalLawContent.getMatch),
// surfaced via a simple Standard/Law toggle in the info-card — no picker.
const LAW_LABELS = {
  mentalism: 'Mentalism', correspondence: 'Correspondence', vibration: 'Vibration',
  causeEffect: 'Cause & Effect', polarity: 'Polarity', attraction: 'Attraction',
  divineOneness: 'Divine Oneness', action: 'Action', compensation: 'Compensation',
  perpetualTransmutation: 'Transmutation',
};
let currentMatrixView = 'STANDARD'; // 'STANDARD' | 'LAW'

function renderViewToggle() {
  document.getElementById('ic-view-standard').classList.toggle('active', currentMatrixView === 'STANDARD');
  document.getElementById('ic-view-law').classList.toggle('active', currentMatrixView === 'LAW');
}
document.getElementById('ic-view-standard').addEventListener('click', (e) => {
  e.stopPropagation();
  currentMatrixView = 'STANDARD';
  if (activeIdx !== -1) showCard(activeIdx);
});
document.getElementById('ic-view-law').addEventListener('click', (e) => {
  e.stopPropagation();
  currentMatrixView = 'LAW';
  if (activeIdx !== -1) showCard(activeIdx);
});

// Shared cross-tier zoom guard. The core arcana, program-star, and talent-star
// click handlers each live in their own IIFE with a private "which one of mine
// is zoomed" flag (_activeProgStar / _activeTalentStar) — none of them know
// about the others. Without this, a click meant to close one tier's zoom can
// hit another tier's invisible raycast target mid-transition and kick off a
// second, competing camera fly-in. Every flyTo*/return function must set this
// on entry to a zoom and clear it on return; every raycast-and-fly branch must
// bail if this is already set.
let activeExtraStar = null; // { tier: 'prog' | 'talent', key }

// Shared lookup so the Star Index panel (built after every tier below has
// initialized) can list and jump to any star without reaching into each
// tier's own private closure state. Each tier IIFE (micro/prog/talent)
// registers a { list(), fly(key) } provider at the end of its own setup;
// list() always reads that tier's live arrays directly (not a snapshot),
// so entries stay correct across date changes with no extra wiring needed.
// Core (A–E) needs no provider — NODES and flyTo() are already reachable
// directly from here since neither is nested in a tier IIFE.
const _tierProviders = {};

// ── RAYCASTER ─────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse2D   = new THREE.Vector2(-999, -999);
const cursor    = document.getElementById('cursor');

// Unified pointer input — mouse hover keeps the existing parallax feel;
// touch drag pans the camera, and a second touch pinches to zoom (mobile
// fix: fixed-FOV frustum clips side content on narrow/portrait viewports,
// so touch users can drag/pinch to reveal or scale it rather than the
// diagram being shrunk to fit).
const activeTouches = new Map(); // pointerId → {x, y}
let _dragStartX = 0, _dragStartY = 0;
let _dragStartPanX = 0, _dragStartPanY = 0;
let _dragDistance = 0;

let _pinchStartDist = 0;
let _pinchStartZoom = baseCamZ;

function _pxToWorld() {
  // World-units-per-pixel is identical on both axes for a standard
  // (non-anamorphic) perspective camera — see PAN_CLAMP comment above.
  const halfH = camZoom * Math.tan(THREE.MathUtils.degToRad(25));
  return (2 * halfH) / window.innerHeight;
}

function _touchDist() {
  const pts = [...activeTouches.values()];
  return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
}

document.addEventListener('pointermove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY  + 'px';

  // Update raycaster mouse (needed for both mouse hover and touch tap hit-testing)
  mouse2D.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1,
  );

  if (e.pointerType === 'touch') {
    if (!activeTouches.has(e.pointerId)) return;
    activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (activeTouches.size >= 2) {
      // Pinch-zoom: pan is frozen while two fingers are down.
      const dist  = _touchDist();
      const scale = dist / _pinchStartDist;
      camZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, _pinchStartZoom / scale));
      wasDragging = true;
      return;
    }

    // Single finger: existing pan behavior.
    const dxPx = e.clientX - _dragStartX;
    const dyPx = e.clientY - _dragStartY;
    _dragDistance = Math.hypot(dxPx, dyPx);
    if (_dragDistance > 6) wasDragging = true;

    const pxToWorld = _pxToWorld();
    panX = Math.max(-PAN_CLAMP, Math.min(PAN_CLAMP, _dragStartPanX - dxPx * pxToWorld));
    panY = Math.max(-PAN_CLAMP, Math.min(PAN_CLAMP, _dragStartPanY + dyPx * pxToWorld));
    return;
  }

  // Mouse (non-touch): existing hover-parallax target, untouched.
  tgtX = (e.clientX / window.innerWidth  - 0.5) *  2.0;
  tgtY = (e.clientY / window.innerHeight - 0.5) * -1.3;
});

document.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'touch') return;

  // A tap with zero movement never fires pointermove, so mouse2D must be
  // set here too — otherwise the raycaster hit-tests against wherever the
  // last drag happened to end instead of this tap's actual position.
  mouse2D.set(
    (e.clientX / window.innerWidth)  * 2 - 1,
   -(e.clientY / window.innerHeight) * 2 + 1,
  );

  wasDragging = false; // each new gesture starts clean — don't let a stale drag eat this tap
  if (isFlying || activeIdx !== -1 || activeExtraStar !== null) return;

  activeTouches.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activeTouches.size === 2) {
    _pinchStartDist = _touchDist();
    _pinchStartZoom = camZoom;
  } else if (activeTouches.size === 1) {
    _dragStartX     = e.clientX;
    _dragStartY     = e.clientY;
    _dragStartPanX  = panX;
    _dragStartPanY  = panY;
    _dragDistance   = 0;
  }
});

document.addEventListener('pointerup', e => {
  activeTouches.delete(e.pointerId);
  if (activeTouches.size === 1) {
    // Dropped from a pinch (or a stray second touch) back to one finger —
    // resume panning from here instead of jumping to the old baseline.
    const [remaining] = activeTouches.values();
    _dragStartX    = remaining.x;
    _dragStartY    = remaining.y;
    _dragStartPanX = panX;
    _dragStartPanY = panY;
    _dragDistance  = 0;
  }
});

// ── CLICK ─────────────────────────────────────────────────────────────────
canvas.addEventListener('click', () => {
  if (wasDragging) { wasDragging = false; return; } // pan gesture, not a tap

  if (isFlying) return;

  if (activeIdx !== -1) {
    // Any click while zoomed into an arcana → return to map
    returnToMap();
    return;
  }

  // A program or talent star is mid-transition or zoomed — that tier's own
  // click handler owns this click; don't start a competing arcana fly-in.
  if (activeExtraStar !== null) return;

  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(hitMeshes);
  const clickedIdx = hits.length > 0 ? hits[0].object.userData.nodeIndex : -1;
  if (clickedIdx !== -1) {
    flyTo(clickedIdx);
  }
});

document.getElementById('hud-back').addEventListener('click', returnToMap);

// ── FLY TO NODE ───────────────────────────────────────────────────────────
const veil = document.getElementById('veil');

function flyTo(idx) {
  if (isFlying || activeIdx !== -1 || activeExtraStar !== null) return;
  isFlying  = true;
  activeIdx = idx;
  const data = NODES[idx];
  const tp   = data.pos;

  // Fade all tags + lines out
  tagEls.forEach(el => gsap.to(el, { opacity: 0, duration: 0.5 }));
  gsap.to(lineMat, { opacity: 0, duration: 0.7 });

  // Camera flies DIRECTLY at the node then blasts 12 units past it
  const overshoot = 12;
  const dir = tp.clone().normalize();
  const destX = tp.x + dir.x * overshoot;
  const destY = tp.y + dir.y * overshoot;
  const destZ = tp.z - overshoot; // always travel inward on Z too

  // Phase 1 (0 → 1.9s): approach, camera accelerates toward the star
  gsap.to(camera.position, {
    x: tp.x, y: tp.y, z: tp.z,
    duration: 1.9,
    ease: 'power2.in',
    onUpdate() { camera.lookAt(tp.x, tp.y, tp.z); },
    onComplete() {
      // Phase 2 (1.9 → 2.6s): blast through into the nebula
      gsap.to(camera.position, {
        x: destX, y: destY, z: destZ,
        duration: 0.7,
        ease: 'power3.out',
        onUpdate() { camera.lookAt(tp.x, tp.y, tp.z); },
        onComplete() {
          isFlying = false;
          showCard(idx);
          gsap.to('#hud-back', { opacity: 1, duration: 0.6 });
        },
      });
    },
  });

  baseCamX = destX;
  baseCamY = destY;

  // Star blooms huge as camera closes in, hides after pass-through
  gsap.to(data.sprite.scale, {
    x: data.baseScale * 22,
    y: data.baseScale * 22,
    duration: 1.9,
    ease: 'power2.in',
  });
  gsap.to(data.sprite.material, {
    opacity: 0,
    duration: 0.25,
    delay: 1.75,
    onComplete() { data.sprite.visible = false; },
  });

  // Veil: flash brilliant white at the moment of entry, then settle to node colour
  const hex = '#' + new THREE.Color(data.color).getHexString();
  veil.style.background = [
    `radial-gradient(ellipse at center,`,
    `  #ffffff 0%,`,
    `  ${hex}cc 18%,`,
    `  ${hex}55 50%,`,
    `  transparent 80%)`,
  ].join('');
  gsap.to(veil, { opacity: 1, duration: 0.18, delay: 1.82,
    onComplete() {
      // Dim to a soft ambient nebula glow
      veil.style.background = [
        `radial-gradient(ellipse at center,`,
        `  ${hex}22 0%,`,
        `  ${hex}10 45%,`,
        `  transparent 75%)`,
      ].join('');
      gsap.to(veil, { opacity: 1, duration: 0.6 });
    },
  });
}

function returnToMap(onDone) {
  if (isFlying) return;
  isFlying = true;
  hideCard();
  currentMatrixView = 'STANDARD'; // always reopen fresh cards on Standard, never sticky
  gsap.to('#hud-back', { opacity: 0, duration: 0.25 });
  // Clear any hover highlight immediately
  if (hoveredIdx !== -1) {
    tagEls[hoveredIdx].classList.remove('lit');
    hoveredIdx = -1;
  }

  const prevIdx = activeIdx;
  activeIdx = -1;
  panX = 0; panY = 0; camZoom = baseCamZ; // recenter pan/zoom on every return to the map

  // Fade veil out
  gsap.to(veil, { opacity: 0, duration: 1.0 });

  // Restore previous star before flying back
  if (prevIdx !== -1) {
    const d = NODES[prevIdx];
    d.sprite.visible = true;
    d.sprite.material.opacity = 0;
    gsap.to(d.sprite.scale, { x: d.baseScale, y: d.baseScale, duration: 0 });
    gsap.to(d.sprite.material, { opacity: 0.78, duration: 1.0, delay: 0.3 });
  }

  gsap.to(camera.position, {
    x: 0, y: 0, z: baseCamZ,
    duration: 2.0, ease: 'power2.inOut',
    onUpdate() { camera.lookAt(0, 0, 0); },
    onComplete() {
      isFlying = false;
      baseCamX = 0;
      baseCamY = 0;
      tagEls.forEach(el => gsap.to(el, { opacity: 1, duration: 0.5 }));
      gsap.to(lineMat, { opacity: 0.11, duration: 1.0 });
      if (onDone) onDone();
    },
  });
}

// ── INFO CARD ─────────────────────────────────────────────────────────────
const infoCard = document.getElementById('info-card');
gsap.set(infoCard, { xPercent: -50, y: 24, opacity: 0, pointerEvents: 'none' });

function showCard(idx) {
  const d   = NODES[idx];

  renderViewToggle();

  if (currentMatrixView === 'LAW') {
    const match = window.DUniversalLawContent && DUniversalLawContent.getMatch(d.num);
    if (match) {
      document.getElementById('ic-arcana').textContent = `Law · ${LAW_LABELS[match.lawKey]}`;
      document.getElementById('ic-name').textContent   = d.label;
      document.getElementById('ic-correlation').textContent = match.correlation;
      document.getElementById('ic-correlation').style.display = '';
      document.getElementById('ic-heading').textContent  = match.heading;
      document.getElementById('ic-why').textContent      = match.why;
      document.getElementById('ic-shadow').textContent   = match.shadow;
      document.getElementById('ic-path').textContent     = match.path;
      document.getElementById('ic-sec-positive').style.display = 'none';
      document.getElementById('ic-sec-negative').style.display = 'none';
      document.getElementById('ic-heading').style.display  = '';
      document.getElementById('ic-sections').style.display = '';
      document.getElementById('ic-desc').style.display     = 'none';
      gsap.to(infoCard, { y: 0, opacity: 1, duration: 0.75, ease: 'power2.out', pointerEvents: 'all' });
      return;
    }
  }

  document.getElementById('ic-correlation').style.display = 'none';

  const mc  = window.DMicroContent && DMicroContent.get(d.num, d.key);

  document.getElementById('ic-arcana').textContent = `Arcana · ${d.arcana}`;
  document.getElementById('ic-name').textContent   = d.label;

  if (mc) {
    document.getElementById('ic-heading').textContent  = mc.heading;
    document.getElementById('ic-why').textContent      = mc.why;
    document.getElementById('ic-shadow').textContent   = mc.shadow;
    document.getElementById('ic-path').textContent     = mc.path;
    document.getElementById('ic-positive').textContent = mc.positive || '';
    document.getElementById('ic-negative').textContent = mc.negative || '';
    document.getElementById('ic-sec-positive').style.display = mc.positive ? '' : 'none';
    document.getElementById('ic-sec-negative').style.display = mc.negative ? '' : 'none';
    document.getElementById('ic-heading').style.display  = '';
    document.getElementById('ic-sections').style.display = '';
    document.getElementById('ic-desc').style.display     = 'none';
  } else {
    document.getElementById('ic-heading').style.display  = 'none';
    document.getElementById('ic-sections').style.display = 'none';
    document.getElementById('ic-desc').style.display     = '';
    document.getElementById('ic-desc').textContent       = d.desc;
  }

  gsap.to(infoCard, { y: 0, opacity: 1, duration: 0.75, ease: 'power2.out', pointerEvents: 'all' });
}
function hideCard() {
  gsap.to(infoCard, { y: 24, opacity: 0, duration: 0.4, pointerEvents: 'none' });
}

// ── PROJECTION ────────────────────────────────────────────────────────────
const _pv = new THREE.Vector3();
function toScreen(v3) {
  _pv.copy(v3).project(camera);
  return {
    x: (_pv.x  + 1) * 0.5 * window.innerWidth,
    y: (-_pv.y + 1) * 0.5 * window.innerHeight,
  };
}

// ── LINE OPACITY BREATHE ──────────────────────────────────────────────────
gsap.to(lineMat, { opacity: 0.17, duration: 4, yoyo: true, repeat: -1, ease: 'sine.inOut' });

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // ─ Parallax damping
  offX += (tgtX - offX) * 0.042;
  offY += (tgtY - offY) * 0.042;

  if (!isFlying && activeIdx === -1) {
    camera.position.x = baseCamX + offX + panX;
    camera.position.y = baseCamY + offY + panY;
    camera.position.z = camZoom;
    camera.lookAt(offX * 0.12 + panX, offY * 0.12 + panY, 0);
  }

  // ─ Background star rotation (independent of nodes)
  starGroup.rotation.y = t * 0.00045;
  starGroup.rotation.x = Math.sin(t * 0.00028) * 0.018;

  // ─ Hover detection
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(hitMeshes);
  const newHover = hits.length > 0 ? hits[0].object.userData.nodeIndex : -1;

  if (newHover !== hoveredIdx) {
    if (hoveredIdx !== -1 && hoveredIdx !== activeIdx) {
      tagEls[hoveredIdx].classList.remove('lit');
      cursor.classList.remove('on-star');
      if (activeIdx === -1) {
        const d = NODES[hoveredIdx];
        gsap.to(d.sprite.scale, { x: d.baseScale, y: d.baseScale, duration: 0.5 });
      }
    }
    hoveredIdx = newHover;
    if (hoveredIdx !== -1) {
      tagEls[hoveredIdx].classList.add('lit');
      cursor.classList.add('on-star');
      if (activeIdx === -1) {
        const d = NODES[hoveredIdx];
        gsap.to(d.sprite.scale, {
          x: d.baseScale * 1.6, y: d.baseScale * 1.6, duration: 0.4,
        });
      }
    } else {
      cursor.classList.remove('on-star');
    }
  }

  // ─ Twinkle + update label positions
  NODES.forEach((data, i) => {
    const tw = Math.sin(t * data.twk.spd + data.twk.off);
    // Don't overwrite opacity while GSAP is fading the star during fly-in
    if (data.sprite.visible && !(isFlying && i === activeIdx)) {
      data.sprite.material.opacity = 0.78 + tw * 0.22;
    }

    // Update HTML tag position (below the star)
    const sc = toScreen(data.pos);
    const tag = tagEls[i];
    tag.style.left = sc.x + 'px';
    tag.style.top  = (sc.y + 38) + 'px';
  });

  // ─ Ambient effects (electrons + quantum particles)
  if (window._ambientUpdate) window._ambientUpdate(t);

  renderer.render(scene, camera);
}

// ── RESIZE ────────────────────────────────────────────────────────────────
// Mobile fix: opening the on-screen keyboard for the DOB edit input shrinks
// window.innerHeight, which used to fire this same handler and re-fit the
// camera/renderer to the shrunken viewport — visually "zooming"/distorting
// the whole scene. Skip the refit entirely while that input is focused.
window.addEventListener('resize', () => {
  const ae = document.activeElement;
  if (ae && (ae.classList.contains('dob-edit') || ae.id === 'l-gate-input')) return;
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  // Re-fit the base camera distance to the new viewport (e.g. orientation
  // change), but only while the map view is idle — avoids yanking the
  // camera mid-fly or while zoomed into a card, mirroring the animate-loop
  // guard that gates camera.position writes on !isFlying && activeIdx===-1.
  if (!isFlying && activeIdx === -1) {
    const wasAtBase = camZoom === baseCamZ;
    baseCamZ = computeFitCamZ();
    if (wasAtBase) camZoom = baseCamZ; // stay fitted unless manually pinched away from it
  }
});

// ── BOOT ──────────────────────────────────────────────────────────────────
const loader = document.getElementById('loader');
gsap.set('#hud-back', { opacity: 0 });

animate(); // start loop immediately (renders while loader is covering)

// Swallows any tap for a short window after a date of birth is entered or
// changed — via the initial gate, the "tap to change" HUD control, or a
// ?dob= link. Covers a stray tap made to dismiss the mobile on-screen
// keyboard landing on the canvas and accidentally raycast-hitting a star,
// which was flying the camera into a random arcana with no way back.
// The flag itself is set inside applyNewDate() (further down) so every
// entry point is covered uniformly, not just the gate. Capture phase +
// stopImmediatePropagation so it runs before (and blocks) all four of
// this file's separate canvas click listeners, regardless of registration
// order.
let _dobJustChanged = false;
canvas.addEventListener('click', e => {
  if (_dobJustChanged) e.stopImmediatePropagation();
}, true);

function revealScene() {
  gsap.to(loader, {
    opacity: 0, duration: 1.2,
    onComplete: () => { loader.style.display = 'none'; },
  });
  gsap.from('#hud',  { opacity: 0, duration: 2.2, delay: 0.4 });
  tagEls.forEach((el, i) => {
    gsap.from(el, { opacity: 0, duration: 1.6, delay: 0.5 + i * 0.1 });
  });
}

// A link with ?dob= already carries a specific reading (the owner's own,
// or one they generated for someone else) — boot normally; that date is
// applied synchronously at the bottom of this script, well before the
// timer below fires, so the reveal never shows the hardcoded default.
// A bare link carries no date, and the hardcoded default IS the page
// owner's real birthday — so it must never be revealed to visitors.
// Swap the progress bar for a mandatory date-of-birth prompt instead,
// and only reveal once someone submits their own valid date.
const _bootParamDob = new URLSearchParams(location.search).get('dob');
if (_bootParamDob) {
  setTimeout(revealScene, 1900);
} else {
  document.getElementById('l-track').style.display = 'none';
  const gate      = document.getElementById('l-gate');
  const gateInput = document.getElementById('l-gate-input');
  const gateError = document.getElementById('l-gate-error');
  gate.style.display = 'flex';
  gateInput.max = new Date().toISOString().slice(0, 10); // no future birthdates

  // No auto-focus/showPicker() here: showPicker() throws (NotAllowedError)
  // without a preceding real user gesture, which a page-load call never
  // has — that silent failure was why this looked broken on desktop
  // (fell back to .focus(), which doesn't visibly open anything). The
  // input is already visible; a normal click/tap opens its picker exactly
  // like any other date field, no JS needed.

  function submitGate() {
    // gateInput.value is always YYYY-MM-DD from a native date input, and a
    // native input reports an empty value if what's typed isn't a real,
    // in-range date — but keep an explicit check as defense-in-depth since
    // js/matrix-engine.js's matrixFromDate() itself doesn't range-check day/month.
    const [y, m, d] = (gateInput.value || '').split('-').map(Number);
    const valid = d >= 1 && d <= 31 && m >= 1 && m <= 12 && y >= 1900 && y <= 2100;

    if (valid && applyNewDate(gateInput.value)) {
      revealScene();
    } else if (gateInput.value) {
      // Only show an error once something was actually entered — an empty
      // value just means they haven't picked a date yet, not a mistake.
      gateError.textContent = 'Please enter a valid date';
      gsap.fromTo(gateInput, { x: -6 }, { x: 0, duration: 0.4, ease: 'elastic.out(1, 0.3)' });
    }
  }

  // Commit on blur, not 'change': on some mobile date pickers 'change'
  // fires the moment a single segment (e.g. just the year) updates, well
  // before the person has finished picking day/month/year — submitting
  // then reads an incomplete date and wrongly reports it as invalid.
  // Waiting for blur means we only read the value once they've actually
  // closed the picker or tapped away.
  gateInput.addEventListener('blur', submitGate);
}

// ── DOB INPUT ─────────────────────────────────────────────────────────────
const hudDate = document.getElementById('hud-date');

// Track current parsed date so we can restore on invalid input
let _dob = { day: 8, month: 5, yearFull: 2002 };

function toRoman(n) {
  return ['I','II','III','IV','V','VI','VII','VIII','IX','X',
          'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX',
          'XXI','XXII'][n - 1] || String(n);
}

function fmtDate(d, m, y) {
  return `${String(d).padStart(2,'0')} · ${String(m).padStart(2,'0')} · ${y}`;
}

function applyNewDate(dateStr) {
  if (!window.DMEngine) return false;
  try {
    const matrix = window.DMEngine.matrixFromDate(dateStr);
    const p = matrix.core;

    // NODES order: [0]=top(A=day), [1]=right(B=month), [2]=bottom(C=year),
    //              [3]=left(D=karmic tail), [4]=center(E=soul)
    [p.A, p.B, p.C, p.D, p.E].forEach((pos, i) => {
      const val = pos.value;
      NODES[i].num    = val;
      NODES[i].arcana = toRoman(val);

      // Swap arcana reading into label/desc if arcana.js is loaded
      if (window.DMArcana) {
        try {
          const a = window.DMArcana.getArcana(val);
          NODES[i].desc = a.identity.split('. ')[0] + '.';
        } catch (_) {}
      }

      // Fade number out → update → fade in
      const numEl = tagEls[i].querySelector('.t-num');
      gsap.to(numEl, {
        opacity: 0, duration: 0.22,
        onComplete() {
          numEl.textContent = val;
          gsap.to(numEl, { opacity: 1, duration: 0.35 });
        },
      });
    });

    _dob = { day: matrix.input.day, month: matrix.input.month, yearFull: matrix.input.year };
    hudDate.textContent = fmtDate(_dob.day, _dob.month, _dob.yearFull);
    appendHint();

    // Ignore stray taps for a moment — covers the mobile-keyboard-dismiss-tap
    // hitting the canvas right after any date change (see _dobJustChanged above).
    _dobJustChanged = true;
    setTimeout(() => { _dobJustChanged = false; }, 1000);

    return true;
  } catch (e) {
    return false;
  }
}

function appendHint() {
  // Small "tap to change" label beneath the date — only visible on hover via CSS
  const existing = hudDate.querySelector('.dob-hint');
  if (!existing) {
    const hint = document.createElement('span');
    hint.className = 'dob-hint';
    hint.textContent = 'tap to change';
    hudDate.appendChild(hint);
  }
}

function openDateEdit() {
  if (hudDate.querySelector('input')) return; // already open

  const saved = fmtDate(_dob.day, _dob.month, _dob.yearFull);
  const iso = `${_dob.yearFull}-${String(_dob.month).padStart(2,'0')}-${String(_dob.day).padStart(2,'0')}`;

  hudDate.textContent = '';
  const inp = document.createElement('input');
  inp.type      = 'date';
  inp.className = 'dob-edit';
  inp.value     = iso;
  inp.max       = new Date().toISOString().slice(0, 10); // no future birthdates
  hudDate.appendChild(inp);

  // Native date inputs need an explicit showPicker() call to reliably open
  // their OS picker on a synthetic/programmatic focus (plain .focus() alone
  // doesn't open the calendar dropdown on desktop Chrome, for example).
  if (inp.showPicker) {
    try { inp.showPicker(); } catch (_) { inp.focus(); }
  } else {
    inp.focus();
  }

  // Commit on blur, not 'change': on some mobile date pickers 'change'
  // fires the moment a single segment (e.g. just the year) updates, well
  // before day/month are picked — committing then reads an incomplete
  // date. Waiting for blur means we only read the value once the picker
  // has actually closed or focus has moved away, covering both a real
  // pick and a cancel (no value change) in one place.
  inp.addEventListener('blur', () => {
    if (!inp.value || !applyNewDate(inp.value)) {
      // Invalid, blank, or cancelled — restore original display
      hudDate.textContent = saved;
      appendHint();
    }
    // On success, applyNewDate() already replaced hudDate's content,
    // which removes this input from the DOM.
  });
}

hudDate.addEventListener('click', openDateEdit);
appendHint();

  // placed 2/3 and 1/3 down the B→E segment (matches the LOVE/MON fractional
  // placement pattern already used for the inner channel micro-nodes).
  const ICON_COLOR_MAP = {
    LEADER_ACTION:        0xFFAA33,
    INTUITION_WISDOM:      0xB088FF,
    CREATIVITY_ART:        0xFF6FA8,
    TEACHER_FREEDOM:       0x5FC9FF,
    TRANSFORMATION_POWER:  0xFF6644,
  };

  function dobToISO() {
    return `${_dob.yearFull}-${String(_dob.month).padStart(2,'0')}-${String(_dob.day).padStart(2,'0')}`;
  }

  let _talents = window.DMEngine.calculateDestinyMatrix(dobToISO()).talents;

  const TALENT_POS = {
    thirdEye: new THREE.Vector3(0, 2.47, 0),
    throat:   new THREE.Vector3(0, 1.23, 0),
  };
  const TALENT_LABEL = { thirdEye: 'Ajna · Third Eye', throat: 'Vishuddha · Throat' };
  const KEYS = ['thirdEye', 'throat'];

  // ── Banner (shared with program stars — only one is ever open at a time) ──
  const banner  = document.getElementById('prog-banner');
  const pbClose = document.getElementById('pb-close');

  function openTalent(key) {
    const num  = _talents[key];
    const icon = window.DMEngine.getIconType(num);
    const hex  = '#' + (ICON_COLOR_MAP[icon] || 0xAABBFF).toString(16).padStart(6, '0');
    const content = window.DTalentContent.get(icon);
    if (!content) return;

    document.getElementById('pb-prog-name').textContent = TALENT_LABEL[key] + '  ·  ' + num;
    document.getElementById('pb-prog-name').style.color = hex;
    document.getElementById('pb-section-label').textContent = 'Talent Star Line';
    document.getElementById('pb-section-label').style.color = 'rgba(255,255,255,0.35)';
    document.getElementById('pb-heading').textContent = content.heading;
    document.getElementById('pb-body').innerHTML =
      `<div class="pb-full-section">
         <div class="pb-full-label" style="color:${hex}">THE WHY</div>
         <div class="pb-full-text">${content.why || ''}</div>
       </div>
       <div class="pb-full-section">
         <div class="pb-full-label" style="color:${hex}">THE SHADOW</div>
         <div class="pb-full-text">${content.shadow || ''}</div>
       </div>
       <div class="pb-full-section">
         <div class="pb-full-label" style="color:${hex}">THE PATH</div>
         <div class="pb-full-text">${content.path || ''}</div>
       </div>
       ${content.positive ? `<div class="pb-full-section">
         <div class="pb-full-label" style="color:rgba(130,220,170,0.75)">POSITIVE STATE</div>
         <div class="pb-full-text">${content.positive}</div>
       </div>` : ''}
       ${content.negative ? `<div class="pb-full-section">
         <div class="pb-full-label" style="color:rgba(230,130,130,0.75)">NEGATIVE STATE</div>
         <div class="pb-full-text">${content.negative}</div>
       </div>` : ''}`;
    banner.classList.add('open');
    banner.scrollTop = 0;
    gsap.to(banner, { y:'0%', duration:0.55, ease:'power3.out' });
    _bannerOpenT = true;
  }

  let _bannerOpenT = false;
  function closeTalentBanner() {
    if (!_bannerOpenT) return;
    gsap.to(banner, { y:'105%', duration:0.4, ease:'power2.in',
      onComplete() { banner.classList.remove('open'); }
    });
    _bannerOpenT = false;
  }
  pbClose.addEventListener('click', closeTalentBanner);

  // ── Build star sprites ──────────────────────────────────────────────────
  const _tStars     = {};
  const _tHitMeshes = [];

  KEYS.forEach(key => {
    const pos  = TALENT_POS[key];
    const num  = _talents[key];
    const icon = window.DMEngine.getIconType(num);
    const col  = new THREE.Color(ICON_COLOR_MAP[icon] || 0xAABBFF);

    const coreSp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: nodeTex, color: col,
      transparent: true, blending: THREE.AdditiveBlending,
      depthWrite: false, opacity: 0.85,
    }));
    coreSp.scale.set(0.55, 0.55, 1);
    coreSp.position.copy(pos);
    coreSp.frustumCulled = false;
    scene.add(coreSp);

    const haloSp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: nodeTex, color: col,
      transparent: true, blending: THREE.AdditiveBlending,
      depthWrite: false, opacity: 0.20,
    }));
    haloSp.scale.set(1.9, 1.9, 1);
    haloSp.position.copy(pos);
    haloSp.frustumCulled = false;
    scene.add(haloSp);

    const hit = new THREE.Mesh(
      new THREE.SphereGeometry(0.42, 8, 8),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    hit.position.copy(pos);
    hit.userData.tKey = key;
    hit.frustumCulled = false;
    scene.add(hit);
    _tHitMeshes.push(hit);

    const lbl = document.createElement('div');
    lbl.className = 'node-tag talent-tag';
    lbl.innerHTML = `<div class="t-num" style="color:#${col.getHexString()}">${num}</div>`
      + `<div class="t-label">${TALENT_LABEL[key]}</div>`;
    overlayEl.appendChild(lbl);

    _tStars[key] = { key, num, icon, col, pos: pos.clone(), coreSp, haloSp, lbl, active: false };
  });

  // ── Fly-to + return ───────────────────────────────────────────────────────
  let _activeTalentStar = null;

  function flyToTalent(key) {
    if (isFlying || activeIdx !== -1 || activeExtraStar !== null) return;
    isFlying = true;
    _activeTalentStar = key;
    activeExtraStar = { tier: 'talent', key };

    const s   = _tStars[key];
    const pos = s.coreSp.position.clone();

    tagEls.forEach(el => gsap.to(el, { opacity:0, duration:0.5 }));
    gsap.to(lineMat, { opacity:0, duration:0.7 });
    KEYS.forEach(k => {
      if (k !== key) {
        gsap.to(_tStars[k].coreSp.material, { opacity:0, duration:0.5 });
        gsap.to(_tStars[k].haloSp.material, { opacity:0, duration:0.4 });
      }
    });

    const dir   = pos.clone().normalize();
    const destX = pos.x + dir.x * 12;
    const destY = pos.y + dir.y * 12;
    const destZ = pos.z - 12;

    gsap.to(camera.position, {
      x: pos.x, y: pos.y, z: pos.z,
      duration: 1.9, ease: 'power2.in',
      onUpdate()   { camera.lookAt(pos.x, pos.y, pos.z); },
      onComplete() {
        gsap.to(camera.position, {
          x: destX, y: destY, z: destZ,
          duration: 0.7, ease: 'power3.out',
          onUpdate()   { camera.lookAt(pos.x, pos.y, pos.z); },
          onComplete() {
            isFlying = false;
            openTalent(key);
            gsap.to('#hud-back', { opacity:1, duration:0.6 });
          },
        });
      },
    });

    baseCamX = destX;
    baseCamY = destY;

    gsap.to(s.coreSp.scale, { x:0.55*22, y:0.55*22, duration:1.9, ease:'power2.in' });
    gsap.to(s.coreSp.material, { opacity:0, duration:0.25, delay:1.75,
      onComplete() { s.coreSp.visible = false; }
    });

    const hex = '#' + s.col.getHexString();
    veil.style.background = `radial-gradient(ellipse at center,#fff 0%,${hex}cc 18%,${hex}55 50%,transparent 80%)`;
    gsap.to(veil, { opacity:1, duration:0.18, delay:1.82,
      onComplete() {
        veil.style.background = `radial-gradient(ellipse at center,${hex}22 0%,${hex}10 45%,transparent 75%)`;
        gsap.to(veil, { opacity:1, duration:0.6 });
      },
    });
  }

  function restoreTalentStar(key) {
    const s = _tStars[key];
    s.coreSp.visible = true;
    s.coreSp.material.opacity = 0;
    gsap.to(s.coreSp.scale, { x:0.55, y:0.55, duration:0 });
    gsap.to(s.coreSp.material, { opacity:0.85, duration:1.0 });
    KEYS.forEach(k => {
      if (k !== key) {
        gsap.to(_tStars[k].coreSp.material, { opacity:0.85, duration:0.9 });
        gsap.to(_tStars[k].haloSp.material, { opacity:0.20, duration:0.9 });
      }
    });
  }

  document.getElementById('hud-back').addEventListener('click', () => {
    if (_activeTalentStar === null) return;
    const key = _activeTalentStar;
    _activeTalentStar = null;
    activeExtraStar = null;
    closeTalentBanner();
    gsap.delayedCall(0.5, () => restoreTalentStar(key));
  });

  // ── Click handler ───────────────────────────────────────────────────────
  canvas.addEventListener('click', () => {
    if (wasDragging) { wasDragging = false; return; } // pan gesture, not a tap
    if (isFlying || activeIdx !== -1) return;

    if (_activeTalentStar !== null) {
      const key = _activeTalentStar;
      _activeTalentStar = null;
      activeExtraStar = null;
      closeTalentBanner();
      gsap.delayedCall(0.5, () => restoreTalentStar(key));
      returnToMap();
      return;
    }

    // Another tier (program star) is mid-transition or zoomed — don't start
    // a second, competing fly-in. That tier's own click handler owns this click.
    if (activeExtraStar !== null) return;

    raycaster.setFromCamera(mouse2D, camera);
    const hits = raycaster.intersectObjects(_tHitMeshes);
    if (hits.length) flyToTalent(hits[0].object.userData.tKey);
  });

  // ── Animation loop ───────────────────────────────────────────────────────
  let _hovTalent = null;
  ;(function _tLoop() {
    requestAnimationFrame(_tLoop);
    const t = performance.now() * 0.001;

    KEYS.forEach((key, i) => {
      const s = _tStars[key];
      if (_activeTalentStar !== key) {
        const pulse = Math.sin(t * 0.85 + i * 2.1) * 0.5 + 0.5;
        s.coreSp.material.opacity = 0.65 + pulse * 0.2;
        s.haloSp.material.opacity = 0.10 + pulse * 0.12;
        const sc = 1.0 + pulse * 0.15;
        s.coreSp.scale.set(0.55 * sc, 0.55 * sc, 1);
      }
      const sc2 = toScreen(s.coreSp.position);
      s.lbl.style.left = sc2.x + 'px';
      s.lbl.style.top  = (sc2.y + 18) + 'px';
    });

    if (!isFlying && activeIdx === -1 && _activeTalentStar === null) {
      raycaster.setFromCamera(mouse2D, camera);
      const hits = raycaster.intersectObjects(_tHitMeshes);
      const next = hits.length ? hits[0].object.userData.tKey : null;
      if (next !== _hovTalent) {
        if (_hovTalent !== null) {
          _tStars[_hovTalent].lbl.classList.remove('lit');
          gsap.to(_tStars[_hovTalent].haloSp.scale, { x:1.9, y:1.9, duration:0.4 });
          if (hoveredIdx === -1) cursor.classList.remove('on-star');
        }
        _hovTalent = next;
        if (_hovTalent !== null) {
          _tStars[_hovTalent].lbl.classList.add('lit');
          gsap.to(_tStars[_hovTalent].haloSp.scale, { x:3.0, y:3.0, duration:0.35, ease:'back.out(1.4)' });
          cursor.classList.add('on-star');
        }
      }
    }
  })();

  // ── DOB hook — recompute talents + recolor stars on date change ──────────
  const _prevT = applyNewDate;
  applyNewDate = function(dateStr) {
    const ok = _prevT(dateStr);
    if (!ok) return false;
    _talents = window.DMEngine.calculateDestinyMatrix(dobToISO()).talents;
    KEYS.forEach(key => {
      const s = _tStars[key];
      s.num  = _talents[key];
      s.icon = window.DMEngine.getIconType(s.num);
      s.col  = new THREE.Color(ICON_COLOR_MAP[s.icon] || 0xAABBFF);
      s.coreSp.material.color.copy(s.col);
      s.haloSp.material.color.copy(s.col);
      s.lbl.querySelector('.t-num').textContent = s.num;
      s.lbl.querySelector('.t-num').style.color = '#' + s.col.getHexString();
    });
    return true;
  };

  // ── Star Index provider ──────────────────────────────────────────────────
  _tierProviders.talent = {
    list: () => KEYS.map(key => ({
      key, label: TALENT_LABEL[key], num: _talents[key],
      color: '#' + (ICON_COLOR_MAP[window.DMEngine.getIconType(_talents[key])] || 0xAABBFF).toString(16).padStart(6, '0'),
    })),
    fly: (key) => flyToTalent(key),
  };

})();

// ── SHAREABLE DOB LINK ────────────────────────────────────────────────────
// ?dob=YYYY-MM-DD (or any format js/matrix-engine.js's matrixFromDate accepts) loads
// straight into that date's reading. After any successful date change — via
// this param or the existing tap-to-edit flow — the URL is kept in sync so
// copying the address bar always shares the exact reading on screen.
;(function () {
  const _prevShare = applyNewDate;
  applyNewDate = function(dateStr) {
    const ok = _prevShare(dateStr);
    if (!ok) return false;
    const iso = `${_dob.yearFull}-${String(_dob.month).padStart(2,'0')}-${String(_dob.day).padStart(2,'0')}`;
    history.replaceState(null, '', `${location.pathname}?dob=${iso}`);
    return true;
  };

  const paramDob = new URLSearchParams(location.search).get('dob');
  if (paramDob) applyNewDate(paramDob); // silently falls back to the default on invalid input
})();

// ── STAR INDEX PANEL ──────────────────────────────────────────────────────
// Collapsible top-left quick-nav: every star in the chart, in writing form,
// grouped by tier — click a row to fly straight to that star, same as
// clicking it in the scene. Built last, after every tier IIFE above has
// registered its provider on _tierProviders, so this never has to know any
// tier's internals beyond the shared { list(), fly(key) } shape.
;(function () {
  const root   = document.getElementById('star-index');
  const toggle = document.getElementById('si-toggle');
  const search = document.getElementById('si-search');
  const listEl = document.getElementById('si-list');

  function coreRows() {
    return NODES.map((d, i) => ({
      label: d.label, num: d.num,
      color: '#' + new THREE.Color(d.color).getHexString(),
      fly: () => flyTo(i),
    }));
  }

  function buildGroups() {
    const groups = [{ title: 'Core Cross', rows: coreRows() }];
    if (_tierProviders.micro) {
      groups.push({
        title: 'Ancestral & Channels',
        rows: _tierProviders.micro.list().map(r => ({ ...r, fly: () => _tierProviders.micro.fly(r.idx) })),
      });
    }
    if (_tierProviders.talent) {
      groups.push({
        title: 'Talent Star Line',
        rows: _tierProviders.talent.list().map(r => ({ ...r, fly: () => _tierProviders.talent.fly(r.key) })),
      });
    }
    if (_tierProviders.prog) {
      const rows = _tierProviders.prog.list().map(r => ({ ...r, fly: () => _tierProviders.prog.fly(r.idx) }));
      if (rows.length) groups.push({ title: 'Karmic Programs', rows });
    }
    return groups;
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    listEl.innerHTML = '';
    let anyShown = false;

    buildGroups().forEach(g => {
      const rows = q ? g.rows.filter(r => (r.label + ' ' + r.num).toLowerCase().includes(q)) : g.rows;
      if (!rows.length) return;
      anyShown = true;

      const groupLabel = document.createElement('div');
      groupLabel.className = 'si-group-label';
      groupLabel.textContent = g.title;
      listEl.appendChild(groupLabel);

      rows.forEach(r => {
        const row = document.createElement('div');
        row.className = 'si-row';
        row.innerHTML = `<span class="si-num" style="color:${r.color}">${r.num}</span><span class="si-label">${r.label}</span>`;
        row.addEventListener('click', () => {
          // Every fly*() function already self-guards on isFlying/activeIdx/
          // activeExtraStar — checking here too just avoids the pointless
          // close-then-no-op if a click lands mid-transition.
          if (isFlying || activeIdx !== -1 || activeExtraStar !== null) return;
          root.classList.remove('open');
          search.value = '';
          r.fly();
        });
        listEl.appendChild(row);
      });
    });

    if (!anyShown) {
      const empty = document.createElement('div');
      empty.className = 'si-empty';
      empty.textContent = 'No stars match your search.';
      listEl.appendChild(empty);
    }
  }

  toggle.addEventListener('click', () => {
    const opening = !root.classList.contains('open');
    root.classList.toggle('open');
    if (opening) render();
  });

  search.addEventListener('input', render);

  document.addEventListener('click', (e) => {
    if (root.classList.contains('open') && !root.contains(e.target)) {
      root.classList.remove('open');
    }
  });

  render(); // pre-render once so the very first open has content immediately
})();

})();
</script>
</body>
</html>
